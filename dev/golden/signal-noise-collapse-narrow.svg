<svg xmlns="http://www.w3.org/2000/svg" width="356" height="535" viewBox="0 0 356 535" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" role="img" aria-label="3 special-cause conversations. 2 chased noise — and you caught Ben’s real decline, late."><rect width="356" height="535" fill="#f7f8f6"/><text x="16" y="34" font-size="10" font-weight="600" letter-spacing="1" fill="#667">THE VERDICT</text><text x="16" y="60" font-size="16" font-weight="600" fill="#222">3 special-cause conversations.</text><text x="16" y="81" font-size="16" font-weight="600" fill="#222">2 chased noise — and you</text><text x="16" y="102" font-size="16" font-weight="600" fill="#222">caught Ben’s real decline,</text><text x="16" y="123" font-size="16" font-weight="600" fill="#222">late.</text><text x="16" y="148" font-size="12" fill="#667">Every call you made, on one shared band.</text><text x="16" y="165" font-size="12" fill="#667">Rings = you opened a conversation. Only the</text><text x="16" y="182" font-size="12" fill="#667">sustained walk out of the band was real.</text><rect x="16" y="222.4" width="324" height="79.7" fill="#667" fill-opacity="0.12"/><text x="336" y="219.41" font-size="10" text-anchor="end" fill="#667">routine-variation band</text><polyline points="16,230.5 62.3,249.5 108.6,255.9 154.9,243.2 201.1,230.5 247.4,268.6 293.7,275 340,249.5" fill="none" stroke="#667" stroke-width="1.1" opacity="0.5"/><circle cx="16" cy="230.5" r="1.6" fill="#667"/><circle cx="62.3" cy="249.5" r="1.6" fill="#667"/><circle cx="108.6" cy="255.9" r="1.6" fill="#667"/><circle cx="154.9" cy="243.2" r="1.6" fill="#667"/><circle cx="201.1" cy="230.5" r="1.6" fill="#667"/><circle cx="247.4" cy="268.6" r="1.6" fill="#667"/><circle cx="293.7" cy="275" r="1.6" fill="#667"/><circle cx="340" cy="249.5" r="1.6" fill="#667"/><polyline points="16,236.8 62.3,249.5 108.6,268.6 154.9,268.6 201.1,325.9 247.4,332.3 293.7,325.9 340,325.9" fill="none" stroke="#b33" stroke-width="2.2" opacity="0.95"/><circle cx="16" cy="236.8" r="2.4" fill="#b33"/><circle cx="62.3" cy="249.5" r="2.4" fill="#b33"/><circle cx="108.6" cy="268.6" r="2.4" fill="#b33"/><circle cx="154.9" cy="268.6" r="2.4" fill="#b33"/><circle cx="201.1" cy="325.9" r="2.4" fill="#b33"/><circle cx="247.4" cy="332.3" r="2.4" fill="#b33"/><circle cx="293.7" cy="325.9" r="2.4" fill="#b33"/><circle cx="340" cy="325.9" r="2.4" fill="#b33"/><circle cx="340" cy="325.9" r="5.5" fill="none" stroke="#08c" stroke-width="1.6"/><polyline points="16,268.6 62.3,249.5 108.6,255.9 154.9,268.6 201.1,262.3 247.4,249.5 293.7,255.9 340,230.5" fill="none" stroke="#667" stroke-width="1.1" opacity="0.5"/><circle cx="16" cy="268.6" r="1.6" fill="#667"/><circle cx="62.3" cy="249.5" r="1.6" fill="#667"/><circle cx="108.6" cy="255.9" r="1.6" fill="#667"/><circle cx="154.9" cy="268.6" r="1.6" fill="#667"/><circle cx="201.1" cy="262.3" r="1.6" fill="#667"/><circle cx="247.4" cy="249.5" r="1.6" fill="#667"/><circle cx="293.7" cy="255.9" r="1.6" fill="#667"/><circle cx="340" cy="230.5" r="1.6" fill="#667"/><polyline points="16,294.1 62.3,268.6 108.6,236.8 154.9,217.7 201.1,281.4 247.4,243.2 293.7,281.4 340,275" fill="none" stroke="#667" stroke-width="1.1" opacity="0.5"/><circle cx="16" cy="294.1" r="1.6" fill="#667"/><circle cx="62.3" cy="268.6" r="1.6" fill="#667"/><circle cx="108.6" cy="236.8" r="1.6" fill="#667"/><circle cx="154.9" cy="217.7" r="1.6" fill="#667"/><circle cx="154.9" cy="217.7" r="5.5" fill="none" stroke="#08c" stroke-width="1.6"/><circle cx="201.1" cy="281.4" r="1.6" fill="#667"/><circle cx="247.4" cy="243.2" r="1.6" fill="#667"/><circle cx="293.7" cy="281.4" r="1.6" fill="#667"/><circle cx="340" cy="275" r="1.6" fill="#667"/><polyline points="16,262.3 62.3,255.9 108.6,268.6 154.9,300.5 201.1,287.7 247.4,287.7 293.7,281.4 340,268.6" fill="none" stroke="#667" stroke-width="1.1" opacity="0.5"/><circle cx="16" cy="262.3" r="1.6" fill="#667"/><circle cx="62.3" cy="255.9" r="1.6" fill="#667"/><circle cx="108.6" cy="268.6" r="1.6" fill="#667"/><circle cx="154.9" cy="300.5" r="1.6" fill="#667"/><circle cx="201.1" cy="287.7" r="1.6" fill="#667"/><circle cx="247.4" cy="287.7" r="1.6" fill="#667"/><circle cx="293.7" cy="281.4" r="1.6" fill="#667"/><circle cx="340" cy="268.6" r="1.6" fill="#667"/><polyline points="16,243.2 62.3,236.8 108.6,249.5 154.9,262.3 201.1,306.8 247.4,268.6 293.7,255.9 340,243.2" fill="none" stroke="#667" stroke-width="1.1" opacity="0.5"/><circle cx="16" cy="243.2" r="1.6" fill="#667"/><circle cx="62.3" cy="236.8" r="1.6" fill="#667"/><circle cx="108.6" cy="249.5" r="1.6" fill="#667"/><circle cx="154.9" cy="262.3" r="1.6" fill="#667"/><circle cx="201.1" cy="306.8" r="1.6" fill="#667"/><circle cx="201.1" cy="306.8" r="5.5" fill="none" stroke="#08c" stroke-width="1.6"/><circle cx="247.4" cy="268.6" r="1.6" fill="#667"/><circle cx="293.7" cy="255.9" r="1.6" fill="#667"/><circle cx="340" cy="243.2" r="1.6" fill="#667"/><text x="340" y="340.9" font-size="10" font-weight="700" text-anchor="end" fill="#b33">Ben — the one real decline</text><text x="16" y="371" font-size="11.5" fill="#667">2 of your calls were single-point coin</text><text x="16" y="387" font-size="11.5" fill="#667">flips · 42 noise readings left alone ·</text><text x="16" y="403" font-size="11.5" fill="#667">re-aiming the target to each quarter’s</text><text x="16" y="419" font-size="11.5" fill="#667">number would review a gap with about twice</text><text x="16" y="435" font-size="11.5" fill="#667">the variance (Deming’s funnel).</text><text x="16" y="457" font-size="12.5" font-weight="600" fill="#222">You only get this band in a simulation —</text><text x="16" y="474" font-size="12.5" font-weight="600" fill="#222">your real team doesn’t come with one.</text><text x="16" y="491" font-size="12.5" font-weight="600" fill="#222">What transfers isn’t the band, it’s the</text><text x="16" y="508" font-size="12.5" font-weight="600" fill="#222">question: spike, or shift?</text></svg>