<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="622" viewBox="0 0 1200 622" font-family="Charter,Georgia,serif"><defs><pattern id='mo-hatch' width='6' height='6' patternUnits='userSpaceOnUse' patternTransform='rotate(45)'><line x1='0' y1='0' x2='0' y2='6' stroke='#fff' stroke-width='1.6' opacity='0.55'/></pattern><pattern id='mo-dots' width='6' height='6' patternUnits='userSpaceOnUse'><circle cx='3' cy='3' r='1.15' fill='#fff' opacity='0.6'/></pattern><pattern id='mo-cross' width='7' height='7' patternUnits='userSpaceOnUse'><path d='M0 0 L7 7 M7 0 L0 7' stroke='#fff' stroke-width='1' opacity='0.5'/></pattern></defs><rect width='1200' height='622' fill='#f7f8f6'/><text x="116" y="34" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">MERIT ORDER — £/MWh vs cumulative GW offered</text><rect x='100' y='48' width='1084' height='352' rx='8' fill='#fff' stroke='#ddd'/><g data-plant='Wind' tabindex='0' role='button' aria-label='Wind — £0/MWh, 5.7 GW dispatched'><rect x='116' y='338.29' width='87.99' height='0' fill='#2a78d6'/><rect class='rent' x='116' y='155.43' width='87.99' height='182.86' fill='none'/></g><g data-plant='Hydro' tabindex='0' role='button' aria-label='Hydro — £3/MWh, 1.9 GW dispatched'><rect x='203.99' y='335.54' width='29.59' height='2.74' fill='#eb6834'/><rect class='rent' x='203.99' y='155.43' width='29.59' height='180.11' fill='none'/></g><g data-plant='Nuclear' tabindex='0' role='button' aria-label='Nuclear — £5/MWh, 5 GW dispatched'><rect x='233.58' y='333.71' width='77.87' height='4.57' fill='#4a3aa7'/><rect class='rent' x='233.58' y='155.43' width='77.87' height='178.29' fill='none'/></g><g data-plant='Waste/CHP' tabindex='0' role='button' aria-label='Waste/CHP — £20/MWh, 4.5 GW dispatched'><rect x='311.46' y='320' width='70.08' height='18.29' fill='#eb6834'/><rect class='rent' x='311.46' y='155.43' width='70.08' height='164.57' fill='none'/></g><g data-plant='Biomass' tabindex='0' role='button' aria-label='Biomass — £75/MWh, 2.5 GW dispatched'><rect x='381.54' y='269.71' width='38.94' height='68.57' fill='#008300'/><rect class='rent' x='381.54' y='155.43' width='38.94' height='114.29' fill='none'/></g><g data-plant='Imports' tabindex='0' role='button' aria-label='Imports — £80/MWh, 5 GW dispatched'><rect x='420.47' y='265.14' width='77.87' height='73.14' fill='#e87ba4'/><rect class='rent' x='420.47' y='155.43' width='77.87' height='109.71' fill='none'/></g><g data-plant='CCGT 60%' tabindex='0' role='button' aria-label='CCGT 60% — £83/MWh, 3.1 GW dispatched'><rect x='498.34' y='262.54' width='48.9' height='75.74' fill='#f4a3a2'/><rect class='rent' x='498.34' y='155.43' width='48.9' height='107.11' fill='none'/></g><g data-plant='CCGT 54%' tabindex='0' role='button' aria-label='CCGT 54% — £92/MWh, 7.9 GW dispatched'><rect x='547.25' y='254.43' width='122.26' height='83.85' fill='#ec7675'/><rect class='rent' x='547.25' y='155.43' width='122.26' height='99' fill='none'/></g><g data-plant='Gas-CCS' data-tex='ccs' tabindex='0' role='button' aria-label='Gas-CCS — £93/MWh, 9.5 GW dispatched'><rect x='669.5' y='253.58' width='147.95' height='84.71' fill='#b5766a'/><rect x='669.5' y='253.58' width='147.95' height='84.71' fill='url(#mo-dots)'/><rect class='rent' x='669.5' y='155.43' width='147.95' height='98.15' fill='none'/></g><g data-plant='CCGT 49%' tabindex='0' role='button' aria-label='CCGT 49% — £101/MWh, 4.7 GW dispatched'><rect x='817.46' y='246.15' width='73.35' height='92.13' fill='#e34948'/><rect class='rent' x='817.46' y='155.43' width='73.35' height='90.73' fill='none'/></g><g data-plant='OCGT 42%' tabindex='0' role='button' aria-label='OCGT 42% — £120/MWh, 4.9 GW dispatched'><rect x='890.81' y='228.51' width='75.69' height='109.77' fill='#bf3636'/><rect class='rent' x='890.81' y='155.43' width='75.69' height='73.09' fill='none'/></g><g data-plant='OCGT 36%' tabindex='0' role='button' aria-label='OCGT 36% — £139/MWh, 3.2 GW dispatched'><rect x='966.5' y='211.13' width='50.46' height='127.15' fill='#932a2d'/><rect class='rent' x='966.5' y='155.43' width='50.46' height='55.7' fill='none'/></g><g data-plant='Hydrogen' data-tex='h2' tabindex='0' role='button' aria-label='Hydrogen — £200/MWh, 5.1 GW dispatched'><rect x='1016.96' y='155.43' width='80.21' height='182.86' fill='#722a4e' stroke='#08c' stroke-width='2'/><rect x='1016.96' y='155.43' width='80.21' height='182.86' fill='url(#mo-cross)'/><rect x='1097.17' y='155.43' width='30.37' height='182.86' fill='#722a4e' opacity='0.3'/><text x="1057.07" y="129.43" font-size="11" font-weight="700" text-anchor="middle" stroke="#fff" stroke-width="3" stroke-linejoin="round" paint-order="stroke" fill="#08c">MARGINAL · sets the price</text></g><line class='zero-line' x1='116' y1='338.29' x2='1168' y2='338.29' stroke='#ddd' stroke-width='1.5'/><text x="106" y="342.29" font-size="12" text-anchor="end" fill="#667">£0</text><text x="106" y="68" font-size="11" text-anchor="end" fill="#667">£300</text><text x="106" y="388" font-size="11" text-anchor="end" fill="#667">£-50</text><text x="160" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Wind</text><text x="218.79" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Hydro</text><text x="272.52" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Nuclear</text><text x="346.5" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Waste/CHP</text><text x="459.41" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Imports</text><text x="583.92" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Gas</text><text x="743.48" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Gas-CCS</text><text x="917.21" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Gas</text><text x="1072.25" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Hydrogen</text><line class='clearing-line' x1='116' y1='155.43' x2='1168' y2='155.43' stroke='#08c' stroke-width='2' stroke-dasharray='6 4'/><text x="1168" y="147.43" font-size="12.5" font-weight="700" text-anchor="end" fill="#08c">clears at £200/MWh</text><line class='demand-line' x1='1097.17' y1='64' x2='1097.17' y2='384' stroke='#222' stroke-width='1.5' stroke-dasharray='4 3'/><text x="1097.17" y="56" font-size="12" font-weight="600" text-anchor="middle" fill="#222">demand 63 GW</text><text x="116" y="428" font-size="11" fill="#667">0 GW</text><text x="1168" y="428" font-size="11" text-anchor="end" fill="#667">65 GW offered</text><rect x='116' y='443' width='14' height='14' fill='none' stroke='#08c'/><text x="136" y="454" font-size="11.5" fill="#667">shaded = earns above running cost (storage: the arbitrage spread)</text><rect x='100' y='484' width='4' height='74' fill='#08c'/><text x="116" y="480" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE TRADE</text><text x="116" y="504" font-size="15" fill="#222">63 GW of demand clears at £200/MWh — Hydrogen is the marginal plant and sets the price. The wind has dropped and gas is scarce — a net-zero grid’s</text><text x="116" y="526" font-size="15" fill="#222">firm low-carbon backup (hydrogen or gas-CCS) sets the price, not cheap gas. Shaded plants earn above running cost on every MW they dispatch — that</text><text x="116" y="548" font-size="15" fill="#222">rent, not the price itself, is what the merit order redistributes.</text></svg>