cx="736" cy="216.8" r="1.6" fill="#667"/><polyline points="24,184.1 125.7,175.9 227.4,192.3 329.1,208.6 430.9,265.9 532.6,216.8 634.3,200.5 736,184.1" fill="none" stroke="#667" stroke-width="1.1" opacity="0.5"/><circle cx="24" cy="184.1" r="1.6" fill="#667"/><circle cx="125.7" cy="175.9" r="1.6" fill="#667"/><circle cx="227.4" cy="192.3" r="1.6" fill="#667"/><circle cx="329.1" cy="208.6" r="1.6" fill="#667"/><circle cx="430.9" cy="265.9" r="1.6" fill="#667"/><circle cx="430.9" cy="265.9" r="5.5" fill="none" stroke="#08c" stroke-width="1.6"/><circle cx="532.6" cy="216.8" r="1.6" fill="#667"/><circle cx="634.3" cy="200.5" r="1.6" fill="#667"/><circle cx="736" cy="184.1" r="1.6" fill="#667"/><text x="736" y="305.5" font-size="10" font-weight="700" text-anchor="end" fill="#b33">Ben — the one real decline</text><text x="24" y="341" font-size="11.5" fill="#667">2 of your calls were single-point coin flips · 42 noise readings left alone · re-aiming the</text><text x="24" y="357" font-size="11.5" fill="#667">target to each quarter’s number would review a gap with about twice the variance (Deming’s</text><text x="24" y="373" font-size="11.5" fill="#667">funnel).</text><text x="24" y="395" font-size="12.5" font-weight="600" fill="#222">You only get this band in a simulation — your real team doesn’t come with one. What</text><text x="24" y="412" font-size="12.5" font-weight="600" fill="#222">transfers isn’t the band, it’s the question: spike, or shift?</text></svg>