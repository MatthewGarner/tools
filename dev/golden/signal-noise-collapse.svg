<svg xmlns="http://www.w3.org/2000/svg" width="1088" height="522" viewBox="0 0 1088 522" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" role="img" aria-label="3 special-cause conversations. 2 chased noise — and you caught Ben’s real decline, late."><rect width="1088" height="522" fill="#f7f8f6"/><text x="24" y="34" font-size="10" font-weight="600" letter-spacing="1" fill="#667">THE VERDICT</text><text x="24" y="60" font-size="20" font-weight="600" fill="#222">3 special-cause conversations. 2 chased noise — and you caught Ben’s real decline, late.</text><text x="24" y="90" font-size="13" fill="#667">Every call you made, on one shared band. Rings = you opened a conversation. Only the sustained</text><text x="24" y="107" font-size="13" fill="#667">walk out of the band was real.</text><rect x="24" y="162.3" width="1040" height="148.1" fill="#667" fill-opacity="0.12"/><text x="1060" y="159.33" font-size="9" text-anchor="end" fill="#667">routine-variation band</text><polyline points="24,177.3 172.6,212.7 321.1,224.5 469.7,200.9 618.3,177.3 766.9,248.2 915.4,260 1064,212.7" fill="none" stroke="#667" stroke-width="1.1" opacity="0.5"/><circle cx="24" cy="177.3" r="1.6" fill="#667"/><circle cx="172.6" cy="212.7" r="1.6" fill="#667"/><circle cx="321.1" cy="224.5" r="1.6" fill="#667"/><circle cx="469.7" cy="200.9" r="1.6" fill="#667"/><circle cx="618.3" cy="177.3" r="1.6" fill="#667"/><circle cx="766.9" cy="248.2" r="1.6" fill="#667"/><circle cx="915.4" cy="260" r="1.6" fill="#667"/><circle cx="1064" cy="212.7" r="1.6" fill="#667"/><polyline points="24,189.1 172.6,212.7 321.1,248.2 469.7,248.2 618.3,354.5 766.9,366.4 915.4,354.5 1064,354.5" fill="none" stroke="#b33" stroke-width="2.2" opacity="0.95"/><circle cx="24" cy="189.1" r="2.4" fill="#b33"/><circle cx="172.6" cy="212.7" r="2.4" fill="#b33"/><circle cx="321.1" cy="248.2" r="2.4" fill="#b33"/><circle cx="469.7" cy="248.2" r="2.4" fill="#b33"/><circle cx="618.3" cy="354.5" r="2.4" fill="#b33"/><