cx="736" cy="215.8" r="1.6" fill="#667"/><polyline points="24,183.1 125.7,174.9 227.4,191.3 329.1,207.6 430.9,264.9 532.6,215.8 634.3,199.5 736,183.1" fill="none" stroke="#667" stroke-width="1.1" opacity="0.5"/><circle cx="24" cy="183.1" r="1.6" fill="#667"/><circle cx="125.7" cy="174.9" r="1.6" fill="#667"/><circle cx="227.4" cy="191.3" r="1.6" fill="#667"/><circle cx="329.1" cy="207.6" r="1.6" fill="#667"/><circle cx="430.9" cy="264.9" r="1.6" fill="#667"/><circle cx="430.9" cy="264.9" r="5.5" fill="none" stroke="#08c" stroke-width="1.6"/><circle cx="532.6" cy="215.8" r="1.6" fill="#667"/><circle cx="634.3" cy="199.5" r="1.6" fill="#667"/><circle cx="736" cy="183.1" r="1.6" fill="#667"/><text x="736" y="304.5" font-size="10" font-weight="700" text-anchor="end" fill="#b33">Ben — the one real decline</text><text x="24" y="340" font-size="11.5" fill="#667">2 of your calls were single-point coin flips · 42 quarters correctly left alone · re-aiming the</text><text x="24" y="356" font-size="11.5" fill="#667">target to each quarter’s number would review a gap with about twice the variance (Deming’s</text><text x="24" y="372" font-size="11.5" fill="#667">funnel).</text><text x="24" y="394" font-size="12.5" font-weight="600" fill="#222">You only get this band in a simulation — your real team doesn’t come with one. What</text><text x="24" y="411" font-size="12.5" font-weight="600" fill="#222">transfers isn’t the band, it’s the question: spike, or shift?</text></svg>