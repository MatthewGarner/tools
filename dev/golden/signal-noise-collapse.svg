<svg xmlns="http://www.w3.org/2000/svg" width="760" height="447" viewBox="0 0 760 447" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" role="img" aria-label="3 special-cause conversations. 2 chased noise — and you caught Ben’s real decline, late."><rect width="760" height="447" fill="#f7f8f6"/><text x="24" y="34" font-size="10" font-weight="600" letter-spacing="1" fill="#667">THE VERDICT</text><text x="24" y="60" font-size="18" font-weight="600" fill="#222">3 special-cause conversations. 2 chased noise — and you caught Ben’s real</text><text x="24" y="84" font-size="18" font-weight="600" fill="#222">decline, late.</text><text x="24" y="112" font-size="12" fill="#667">Every call you made, on one shared band. Rings = you opened a conversation. Only the sustained walk out of the band was real.</text><rect x="24" y="157.4" width="712" height="102.5" fill="#667" fill-opacity="0.12"/><text x="732" y="154.38" font-size="9" text-anchor="end" fill="#667">routine-variation band</text><polyline points="24,167.7 125.7,192.3 227.4,200.5 329.1,184.1 430.9,167.7 532.6,216.8 634.3,225 736,192.3" fill="none" stroke="#667" stroke-width="1.1" opacity="0.5"/><circle cx="24" cy="167.7" r="1.6" fill="#667"/><circle cx="125.7" cy="192.3" r="1.6" fill="#667"/><circle cx="227.4" cy="200.5" r="1.6" fill="#667"/><circle cx="329.1" cy="184.1" r="1.6" fill="#667"/><circle cx="430.9" cy="167.7" r="1.6" fill="#667"/><circle cx="532.6" cy="216.8" r="1.6" fill="#667"/><circle cx="634.3" cy="225" r="1.6" fill="#667"/><circle cx="736" cy="192.3" r="1.6" fill="#667"/><polyline points="24,175.9 125.7,192.3 227.4,216.8 329.1,216.8 430.9,290.5 532.6,298.6 634.3,290.5 736,290.5" fill="none" stroke="#b33" stroke-width="2.2" opacity="0.95"/><circle cx="24" cy="175.9" r="2.4" fill="#b33"/><circle cx="125.7" cy="192.3" r="2.4" fill="#b33"/><circle cx="227.4" cy="216.8" r="2.4" fill="#b33"/><circle cx="329.1" cy="216.8" r="2.4" fill="#b33"/><circle cx="430.9" cy="290.5" r="2.4" fill