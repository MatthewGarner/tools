 x="66" y="766" font-size="15" fill="#222">spends budget the best single</text><text x="66" y="788" font-size="15" fill="#222">days want back.</text><text x="48" y="814" font-size="11" text-anchor="middle" fill="#667">0</text><text x="131.61" y="814" font-size="11" text-anchor="middle" fill="#667">50</text><text x="215.23" y="814" font-size="11" text-anchor="middle" fill="#667">100</text><text x="298.84" y="814" font-size="11" text-anchor="middle" fill="#667">150</text><rect x='24' y='818' width='312' height='488' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="844" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE ASSET LIFE</text><rect x='66.4' y='862' width='33.6' height='190' fill='none'/><text x="83.2" y="1044" font-size="11" text-anchor="middle" fill="#222">augment window</text><path d='M56.8 862.0 L74.4 874.0 L92.0 884.1 L109.6 893.7 L127.2 903.1 L144.8 912.1 L162.4 920.8 L180.0 929.4 L197.6 938.0 L215.2 946.4 L232.8 954.6 L250.4 962.6 L268.0 970.4 L285.6 978.0 L303.2 985.4 L303.2 1028.3 L285.6 1020.6 L268.0 1012.5 L250.4 1003.9 L232.8 994.8 L215.2 985.1 L197.6 974.9 L180.0 964.1 L162.4 952.7 L144.8 940.5 L127.2 928.3 L109.6 914.6 L92.0 900.8 L74.4 886.6 L56.8 873.5 Z' fill='none' stroke='none'/><path d='M56.8 866.5 L74.4 879.4 L92.0 891.8 L109.6 903.8 L127.2 915.4 L144.8 926.4 L162.4 937.0 L180.0 947.1 L197.6 956.7 L215.2 966.1 L232.8 975.2 L250.4 983.9 L268.0 992.2 L285.6 1000.4 L303.2 1008.1' fill='none' stroke='#08c' stroke-width='2.5'/><text x="48" y="874" font-size="11" text-anchor="start" fill="#667">£4.19M/yr</text><text x="308" y="874" font-size="11" text-anchor="end" fill="#667">fan P10–P90</text><text x="56.8" y="1068" font-size="10.5" text-anchor="middle" fill="#667">y1</text><text x="92" y="1068" font-size="10.5" text-anchor="middle" fill="#667">y3</text><text x="127.2" y="1068" font-size="10.5" text-anchor="middle" fill="#667">y5</text><text x="162.4" y="1068" font-size="10.5" text-anchor="middle" fill="#667">y7</text><text x="197.6" y="1068" font-size="10.5" text-anchor="middle" fill="#667">y9</text><text x="232.8" y="1068" font-size="10.5" text-anchor="middle" fill="#667">y11</text><text x="268" y="1068" font-size="10.5" text-anchor="middle" fill="#667">y13</text><text x="303.2" y="1068" font-size="10.5" text-anchor="middle" fill="#667">y15</text><line x1='48' y1='1122' x2='312' y2='1122' stroke='#ddd'/><path d='M56.8 1079.9 L74.4 1081.8 L92.0 1083.7 L109.6 1085.6 L127.2 1087.5 L144.8 1089.4 L162.4 1091.3 L180.0 1093.2 L197.6 1095.1 L215.2 1097.0 L232.8 1098.9 L250.4 1100.8 L268.0 1102.7 L285.6 1104.7 L303.2 1106.6' fill='none' stroke='#667' stroke-width='1.5'/><path d='M56.8 1078.0 L74.4 1080.9 L92.0 1083.7 L109.6 1086.6 L127.2 1089.4 L144.8 1092.3 L162.4 1095.1 L180.0 1098.0 L197.6 1100.9 L215.2 1103.7 L232.8 1106.6 L250.4 1109.4 L268.0 1112.3 L285.6 1115.1 L303.2 1118.0' fill='none' stroke='#08c' stroke-width='1.5' stroke-dasharray='4 3'/><text x="312" y="1106.55" font-size="10.5" text-anchor="end" fill="#667">SoH 29%</text><text x="312" y="1130" font-size="10.5" text-anchor="end" fill="#667">0 cycles left</text><g><rect x='44.0' y='1130' width='174.0' height='22' rx='11' fill='none'/><text x="54" y="1145" font-size="12" font-weight="600" fill="#222">augment 120..180 £/kWh</text></g><g><rect x='44.0' y='1158' width='125.0' height='22' rx='11' fill='none'/><text x="54" y="1173" font-size="12" font-weight="600" fill="#222">drift -4..0%/yr</text></g><g><rect x='177.0' y='1158' width='125.0' height='22' rx='11' fill='none'/><text x="187" y="1173" font-size="12" font-weight="600" fill="#667">never pays 5/10</text></g><rect x='48' y='1190' width='4' height='110' fill='#08c'/><text x="66" y="1206" font-size="15" fill="#222">It’s a coin flip whether</text><text x="66" y="1228" font-size="15" fill="#222">augmentation pays at all (never</text><text x="66" y="1250" font-size="15" fill="#222">in 5 runs in 10) — when it does,</text><text x="66" y="1272" font-size="15" fill="#222">the window is years</text><text x="66" y="1294" font-size="15" fill="#222">2–3 (P25–P75).</text></svg>