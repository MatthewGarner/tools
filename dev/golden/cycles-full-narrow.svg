<svg xmlns='http://www.w3.org/2000/svg' width='360' height='1220' viewBox='0 0 360 1220' font-family='Charter,Georgia,serif'><rect width='360' height='1220' fill='#f7f8f6'/><rect x='48' y='34' width='34' height='4' fill='#08c'/><text x="48" y="66" font-size="26" font-weight="700" fill="#222">Cycle budget — Wexcombe 100MW/2h</text><rect x='24' y='92' width='312' height='310' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="118" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE CYCLE PRICE — DISPATCH THRESHOLD</text><rect x='300' y='132' width='2.4' height='34' fill='none'/><text x="301.21" y="146" font-size="11" text-anchor="middle" fill="#b33">don’t cycle</text><path d='M300 166 L300.1 166.0 L300.3 166.0 L300.5 166.0 L300.7 166.0 L300.8 166.0 L301.0 165.6 L301.2 166.0 L301.4 165.6 L301.6 166.0 L301.8 163.1 L302.0 161.9 L302.2 156.5 L302.3 157.3 L302.5 150.2 L302.7 145.7 L302.9 143.6 L303.1 144.0 L303.3 139.9 L303.5 136.1 L303.7 132.0 L303.8 141.5 L304.0 139.5 L304.2 142.0 L304.4 143.6 L304.6 146.5 L304.8 149.8 L305.0 155.6 L305.2 151.9 L305.3 154.0 L305.5 157.3 L305.7 155.6 L305.9 161.0 L306.1 159.8 L306.3 161.9 L306.5 163.1 L306.7 162.3 L306.8 164.3 L307.0 163.5 L307.2 165.6 L307.4 166.0 L307.6 165.2 L307.8 165.6 L308.0 165.2 L308.2 166.0 L308.3 166.0 L308.5 166.0 L308.7 166.0 L308.9 166.0 L309.1 166.0 L309.3 166.0 L309.5 166.0 L309.7 166.0 L309.8 166.0 L310.0 166.0 L310.2 166.0 L310.4 166.0 L310.6 165.6 L310.8 166.0 L311.0 166.0 L311.2 166.0 L311.3 166.0 L311.5 165.6 L311.7 166.0 L311.9 166.0 L312 166 Z' fill='none' stroke='none'/><text x="308" y="144" font-size="11" text-anchor="end" fill="#667">ribbon = days</text><line x1='302.4' y1='126' x2='302.4' y2='176' stroke='#08c' stroke-width='2.5'/><line x1='302.3' y1='176' x2='302.5' y2='176' stroke='#08c' stroke-width='2.5'/><line x1='302.3' y1='171' x2='302.3' y2='181' stroke='#08c' stroke-width='2.5'/><line x1='302.5' y1='171' x2='302.5' y2='181' stroke='#08c' stroke-width='2.5'/><text x="302.41" y="194" font-size="11.5" text-anchor="middle" fill="#667">£31.7/MWh — whisker = your beliefs (P10–P90)</text><text x="308" y="158" font-size="11.5" fill="#222">~345 days a year clear</text><g><rect x='44.0' y='204' width='55.0' height='22' rx='11' fill='none'/><text x="54" y="219" font-size="12" font-weight="600" fill="#222">100MW</text></g><g><rect x='107.0' y='204' width='62.0' height='22' rx='11' fill='none'/><text x="117" y="219" font-size="12" font-weight="600" fill="#222">200MWh</text></g><rect x='177.0' y='204' width='111.0' height='22' rx='11' fill='none'/><text x="187" y="219" font-size="12" font-weight="600" fill="#667">spread</text><g><text x="236" y="219" font-size="12" font-weight="600" fill="#222">35</text></g><text x="250" y="219" font-size="12" font-weight="600" fill="#667">..</text><g><text x="264" y="219" font-size="12" font-weight="600" fill="#222">85</text></g><rect x='296.0' y='204' width='146.0' height='22' rx='11' fill='none'/><text x="306" y="219" font-size="12" font-weight="600" fill="#667">fade</text><g><text x="341" y="219" font-size="12" font-weight="600" fill="#222">0.006</text></g><text x="376" y="219" font-size="12" font-weight="600" fill="#667">..</text><g><text x="390" y="219" font-size="12" font-weight="600" fill="#222">0.012%</text></g><g><rect x='450.0' y='204' width='97.0' height='22' rx='11' fill='none'/><text x="460" y="219" font-size="12" font-weight="600" fill="#222">budget 6000</text></g><g><rect x='555.0' y='204' width='83.0' height='22' rx='11' fill='none'/><text x="565" y="219" font-size="12" font-weight="600" fill="#222">over 15yr</text></g><rect x='44.0' y='232' width='111.0' height='22' rx='11' fill='none'/><text x="54" y="247" font-size="12" font-weight="600" fill="#667">charge</text><g><text x="103" y="247" font-size="12" font-weight="600" fill="#222">15</text></g><text x="117" y="247" font-size="12" font-weight="600" fill="#667">..</text><g><text x="131" y="247" font-size="12" font-weight="600" fill="#222">45</text></g><rect x='163.0' y='232' width='97.0' height='22' rx='11' fill='none'/><text x="173" y="247" font-size="12" font-weight="600" fill="#667">rte</text><g><text x="201" y="247" font-size="12" font-weight="600" fill="#222">86</text></g><text x="215" y="247" font-size="12" font-weight="600" fill="#667">..</text><g><text x="229" y="247" font-size="12" font-weight="600" fill="#222">90%</text></g><rect x='268.0' y='232' width='132.0' height='22' rx='11' fill='none'/><text x="278" y="247" font-size="12" font-weight="600" fill="#667">calendar</text><g><text x="341" y="247" font-size="12" font-weight="600" fill="#222">1</text></g><text x="348" y="247" font-size="12" font-weight="600" fill="#667">..</text><g><text x="362" y="247" font-size="12" font-weight="600" fill="#222">1.8%</text></g><g><rect x='408.0' y='232' width='251.0' height='22' rx='11' fill='none'/><text x="418" y="247" font-size="12" font-weight="600" fill="#667">binds: warranty 10/10 · wear 0/10</text></g><rect x='48' y='264' width='4' height='132' fill='#08c'/><text x="66" y="280" font-size="15" fill="#222">Cycles are worth £31.7/MWh each</text><text x="66" y="302" font-size="15" fill="#222">(P10 £29.8/MWh – P90 £33/MWh) —</text><text x="66" y="324" font-size="15" fill="#222">only dispatch above that; 345</text><text x="66" y="346" font-size="15" fill="#222">days a year clear it. In 10 runs</text><text x="66" y="368" font-size="15" fill="#222">in 10 it’s the warranty doing</text><text x="66" y="390" font-size="15" fill="#222">the rationing, not the wear.</text><rect x='24' y='420' width='312' height='304' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="446" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE SECOND CYCLE</text><rect x='300' y='460' width='2.4' height='30' fill='none'/><path d='M300 490 L300.1 490.0 L300.3 489.8 L300.5 489.0 L300.7 483.3 L300.8 475.1 L301.0 466.4 L301.2 464.2 L301.4 460.0 L301.6 462.7 L301.8 464.0 L302.0 463.2 L302.2 471.9 L302.3 475.1 L302.5 481.8 L302.7 481.1 L302.9 485.5 L303.1 486.0 L303.3 488.0 L303.5 488.5 L303.7 488.3 L303.8 489.8 L304.0 489.5 L304.2 489.0 L304.4 490.0 L304.6 490.0 L304.8 490.0 L305.0 490.0 L305.2 489.8 L305.3 490.0 L305.5 490.0 L305.7 490.0 L305.9 490.0 L306.1 490.0 L306.3 490.0 L306.5 490.0 L306.7 490.0 L306.8 490.0 L307.0 490.0 L307.2 490.0 L307.4 490.0 L307.6 490.0 L307.8 490.0 L308.0 490.0 L308.2 490.0 L308.3 490.0 L308.5 490.0 L308.7 490.0 L308.9 490.0 L309.1 490.0 L309.3 490.0 L309.5 490.0 L309.7 490.0 L309.8 490.0 L310.0 490.0 L310.2 490.0 L310.4 490.0 L310.6 490.0 L310.8 490.0 L311.0 490.0 L311.2 490.0 L311.3 490.0 L311.5 490.0 L311.7 490.0 L311.9 490.0 L312 490 Z' fill='none' stroke='none'/><line x1='302.4' y1='454' x2='302.4' y2='496' stroke='#08c' stroke-width='2.5'/><text x="308" y="472" font-size="11" text-anchor="end" fill="#667">second-cycle days (same bar)</text><g><rect x='44.0' y='512' width='118.0' height='22' rx='11' fill='none'/><text x="54" y="527" font-size="12" font-weight="600" fill="#222">second 35..60%</text></g><g><rect x='170.0' y='512' width='125.0' height='22' rx='11' fill='none'/><text x="180" y="527" font-size="12" font-weight="600" fill="#667">+£310k/yr gross</text></g><g><rect x='303.0' y='512' width='118.0' height='22' rx='11' fill='none'/><text x="313" y="527" font-size="12" font-weight="600" fill="#667">−£168k/yr wear</text></g><g><rect x='429.0' y='512' width='104.0' height='22' rx='11' fill='none'/><text x="439" y="527" font-size="12" font-weight="600" fill="#667">£142k/yr net</text></g><rect x='48' y='542' width='4' height='176' fill='#08c'/><text x="66" y="558" font-size="15" fill="#222">The second cycle earns £310k/yr</text><text x="66" y="580" font-size="15" fill="#222">and costs £168k/yr of wear —</text><text x="66" y="602" font-size="15" fill="#222">£142k/yr net, and it pays over</text><text x="66" y="624" font-size="15" fill="#222">the life (£1.27M NPV). The</text><text x="66" y="646" font-size="15" fill="#222">warranty caps the pair in 10</text><text x="66" y="668" font-size="15" fill="#222">runs in 10 — the second cycle</text><text x="66" y="690" font-size="15" fill="#222">spends budget the best single</text><text x="66" y="712" font-size="15" fill="#222">days want back.</text><text x="300" y="738" font-size="11" text-anchor="middle" fill="#667">0</text><text x="303.8" y="738" font-size="11" text-anchor="middle" fill="#667">50</text><text x="307.6" y="738" font-size="11" text-anchor="middle" fill="#667">100</text><text x="311.4" y="738" font-size="11" text-anchor="middle" fill="#667">150</text><text x="292" y="738" font-size="11" font-weight="600" text-anchor="end" fill="#667">£/MWh net</text><rect x='24' y='742' width='312' height='438' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="768" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE ASSET LIFE</text><rect x='293.2' y='786' width='16.8' height='190' fill='none'/><text x="301.6" y="800" font-size="11" text-anchor="middle" fill="#222">augment window</text><path d='M300.4 786.0 L301.2 798.0 L302.0 808.1 L302.8 817.7 L303.6 827.1 L304.4 836.1 L305.2 844.8 L306.0 853.4 L306.8 862.0 L307.6 870.4 L308.4 878.6 L309.2 886.6 L310.0 894.4 L310.8 902.0 L311.6 909.4 L311.6 952.3 L310.8 944.6 L310.0 936.5 L309.2 927.9 L308.4 918.8 L307.6 909.1 L306.8 898.9 L306.0 888.1 L305.2 876.7 L304.4 864.5 L303.6 852.3 L302.8 838.6 L302.0 824.8 L301.2 810.6 L300.4 797.5 Z' fill='none' stroke='none'/><path d='M300.4 790.5 L301.2 803.4 L302.0 815.8 L302.8 827.8 L303.6 839.4 L304.4 850.4 L305.2 861.0 L306.0 871.1 L306.8 880.7 L307.6 890.1 L308.4 899.2 L309.2 907.9 L310.0 916.2 L310.8 924.4 L311.6 932.1' fill='none' stroke='#08c' stroke-width='2.5'/><text x="292" y="794.48" font-size="11" text-anchor="end" fill="#667">£4.19M/yr</text><text x="308" y="798" font-size="11" text-anchor="end" fill="#667">revenue fan P10–P90</text><text x="300.4" y="992" font-size="10.5" text-anchor="middle" fill="#667">y1</text><text x="302" y="992" font-size="10.5" text-anchor="middle" fill="#667">y3</text><text x="303.6" y="992" font-size="10.5" text-anchor="middle" fill="#667">y5</text><text x="305.2" y="992" font-size="10.5" text-anchor="middle" fill="#667">y7</text><text x="306.8" y="992" font-size="10.5" text-anchor="middle" fill="#667">y9</text><text x="308.4" y="992" font-size="10.5" text-anchor="middle" fill="#667">y11</text><text x="310" y="992" font-size="10.5" text-anchor="middle" fill="#667">y13</text><text x="311.6" y="992" font-size="10.5" text-anchor="middle" fill="#667">y15</text><line x1='300' y1='1046' x2='312' y2='1046' stroke='#ddd'/><path d='M300.4 1003.9 L301.2 1005.8 L302.0 1007.7 L302.8 1009.6 L303.6 1011.5 L304.4 1013.4 L305.2 1015.3 L306.0 1017.2 L306.8 1019.1 L307.6 1021.0 L308.4 1022.9 L309.2 1024.8 L310.0 1026.7 L310.8 1028.7 L311.6 1030.6' fill='none' stroke='#667' stroke-width='1.5'/><path d='M300.4 1002.0 L301.2 1004.9 L302.0 1007.7 L302.8 1010.6 L303.6 1013.4 L304.4 1016.3 L305.2 1019.1 L306.0 1022.0 L306.8 1024.9 L307.6 1027.7 L308.4 1030.6 L309.2 1033.4 L310.0 1036.3 L310.8 1039.1 L311.6 1042.0' fill='none' stroke='#08c' stroke-width='1.5' stroke-dasharray='4 3'/><text x="312" y="1030.55" font-size="10.5" text-anchor="end" fill="#667">SoH 29%</text><text x="312" y="1054" font-size="10.5" text-anchor="end" fill="#667">0 cycles left</text><g><rect x='44.0' y='1034' width='174.0' height='22' rx='11' fill='none'/><text x="54" y="1049" font-size="12" font-weight="600" fill="#222">augment 120..180 £/kWh</text></g><g><rect x='226.0' y='1034' width='125.0' height='22' rx='11' fill='none'/><text x="236" y="1049" font-size="12" font-weight="600" fill="#222">drift -4..0%/yr</text></g><g><rect x='359.0' y='1034' width='125.0' height='22' rx='11' fill='none'/><text x="369" y="1049" font-size="12" font-weight="600" fill="#667">never pays 5/10</text></g><rect x='48' y='1064' width='4' height='110' fill='#08c'/><text x="66" y="1080" font-size="15" fill="#222">It’s a coin flip whether</text><text x="66" y="1102" font-size="15" fill="#222">augmentation pays at all (never</text><text x="66" y="1124" font-size="15" fill="#222">in 5 runs in 10) — when it does,</text><text x="66" y="1146" font-size="15" fill="#222">the window is years</text><text x="66" y="1168" font-size="15" fill="#222">2–3 (P25–P75).</text></svg>