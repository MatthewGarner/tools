<svg xmlns='http://www.w3.org/2000/svg' width='360' height='1346' viewBox='0 0 360 1346' font-family='Charter,Georgia,serif'><rect width='360' height='1346' fill='#f7f8f6'/><rect x='48' y='18' width='34' height='4' fill='#08c'/><text x="48" y="42" font-size="18" font-weight="700" fill="#222">Cycle budget — Wexcombe 100MW/2h</text><rect x='24' y='58' width='312' height='396' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="84" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE CYCLE PRICE</text><rect x='48' y='98' width='53.1' height='34' fill='none'/><text x="74.54" y="112" font-size="11" text-anchor="middle" fill="#b33">don’t cycle</text><path d='M48 132 L50.1 132.0 L54.2 132.0 L58.3 132.0 L62.4 132.0 L66.6 132.0 L70.7 131.6 L74.8 132.0 L78.9 131.6 L83.1 132.0 L87.2 129.1 L91.3 127.9 L95.4 122.5 L99.6 123.3 L103.7 116.2 L107.8 111.7 L111.9 109.6 L116.1 110.0 L120.2 105.9 L124.3 102.1 L128.4 98.0 L132.6 107.5 L136.7 105.5 L140.8 108.0 L144.9 109.6 L149.1 112.5 L153.2 115.8 L157.3 121.6 L161.4 117.9 L165.6 120.0 L169.7 123.3 L173.8 121.6 L177.9 127.0 L182.1 125.8 L186.2 127.9 L190.3 129.1 L194.4 128.3 L198.6 130.3 L202.7 129.5 L206.8 131.6 L210.9 132.0 L215.1 131.2 L219.2 131.6 L223.3 131.2 L227.4 132.0 L231.6 132.0 L235.7 132.0 L239.8 132.0 L243.9 132.0 L248.1 132.0 L252.2 132.0 L256.3 132.0 L260.4 132.0 L264.6 132.0 L268.7 132.0 L272.8 132.0 L276.9 132.0 L281.1 131.6 L285.2 132.0 L289.3 132.0 L293.4 132.0 L297.6 132.0 L301.7 131.6 L305.8 132.0 L309.9 132.0 L312 132 Z' fill='none' stroke='none'/><text x="308" y="110" font-size="11" text-anchor="end" fill="#667">ribbon = days</text><line x1='101.1' y1='92' x2='101.1' y2='142' stroke='#08c' stroke-width='2.5'/><line x1='97.8' y1='142' x2='103.2' y2='142' stroke='#08c' stroke-width='2.5'/><line x1='97.8' y1='137' x2='97.8' y2='147' stroke='#08c' stroke-width='2.5'/><line x1='103.2' y1='137' x2='103.2' y2='147' stroke='#08c' stroke-width='2.5'/><text x="48" y="160" font-size="11.5" text-anchor="start" fill="#667">£31.7/MWh · whisker = beliefs</text><text x="115.08" y="124" font-size="11.5" fill="#222">~345 days a year clear</text><g><rect x='44.0' y='172' width='55.0' height='22' rx='11' fill='none'/><text x="54" y="187" font-size="12" font-weight="600" fill="#222">100MW</text></g><g><rect x='107.0' y='172' width='62.0' height='22' rx='11' fill='none'/><text x="117" y="187" font-size="12" font-weight="600" fill="#222">200MWh</text></g><rect x='177.0' y='172' width='111.0' height='22' rx='11' fill='none'/><text x="187" y="187" font-size="12" font-weight="600" fill="#667">spread</text><g><text x="236" y="187" font-size="12" font-weight="600" fill="#222">35</text></g><text x="250" y="187" font-size="12" font-weight="600" fill="#667">..</text><g><text x="264" y="187" font-size="12" font-weight="600" fill="#222">85</text></g><rect x='44.0' y='200' width='146.0' height='22' rx='11' fill='none'/><text x="54" y="215" font-size="12" font-weight="600" fill="#667">fade</text><g><text x="89" y="215" font-size="12" font-weight="600" fill="#222">0.006</text></g><text x="124" y="215" font-size="12" font-weight="600" fill="#667">..</text><g><text x="138" y="215" font-size="12" font-weight="600" fill="#222">0.012%</text></g><g><rect x='198.0' y='200' width='97.0' height='22' rx='11' fill='none'/><text x="208" y="215" font-size="12" font-weight="600" fill="#222">budget 6000</text></g><g><rect x='44.0' y='228' width='83.0' height='22' rx='11' fill='none'/><text x="54" y="243" font-size="12" font-weight="600" fill="#222">over 15yr</text></g><rect x='135.0' y='228' width='111.0' height='22' rx='11' fill='none'/><text x="145" y="243" font-size="12" font-weight="600" fill="#667">charge</text><g><text x="194" y="243" font-size="12" font-weight="600" fill="#222">15</text></g><text x="208" y="243" font-size="12" font-weight="600" fill="#667">..</text><g><text x="222" y="243" font-size="12" font-weight="600" fill="#222">45</text></g><rect x='44.0' y='256' width='97.0' height='22' rx='11' fill='none'/><text x="54" y="271" font-size="12" font-weight="600" fill="#667">rte</text><g><text x="82" y="271" font-size="12" font-weight="600" fill="#222">86</text></g><text x="96" y="271" font-size="12" font-weight="600" fill="#667">..</text><g><text x="110" y="271" font-size="12" font-weight="600" fill="#222">90%</text></g><rect x='149.0' y='256' width='132.0' height='22' rx='11' fill='none'/><text x="159" y="271" font-size="12" font-weight="600" fill="#667">calendar</text><g><text x="222" y="271" font-size="12" font-weight="600" fill="#222">1</text></g><text x="229" y="271" font-size="12" font-weight="600" fill="#667">..</text><g><text x="243" y="271" font-size="12" font-weight="600" fill="#222">1.8%</text></g><g><rect x='44.0' y='284' width='251.0' height='22' rx='11' fill='none'/><text x="54" y="299" font-size="12" font-weight="600" fill="#667">binds: warranty 10/10 · wear 0/10</text></g><rect x='48' y='316' width='4' height='132' fill='#08c'/><text x="66" y="332" font-size="15" fill="#222">Cycles are worth £31.7/MWh each</text><text x="66" y="354" font-size="15" fill="#222">(P10 £29.8/MWh – P90 £33/MWh) —</text><text x="66" y="376" font-size="15" fill="#222">only dispatch above that; 345</text><text x="66" y="398" font-size="15" fill="#222">days a year clear it. In 10 runs</text><text x="66" y="420" font-size="15" fill="#222">in 10 it’s the warranty doing</text><text x="66" y="442" font-size="15" fill="#222">the rationing, not the wear.</text><rect x='24' y='472' width='312' height='328' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="498" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE SECOND CYCLE</text><rect x='48' y='512' width='53.1' height='30' fill='none'/><path d='M48 542 L50.1 542.0 L54.2 541.8 L58.3 541.0 L62.4 535.3 L66.6 527.1 L70.7 518.4 L74.8 516.2 L78.9 512.0 L83.1 514.7 L87.2 516.0 L91.3 515.2 L95.4 523.9 L99.6 527.1 L103.7 533.8 L107.8 533.1 L111.9 537.5 L116.1 538.0 L120.2 540.0 L124.3 540.5 L128.4 540.3 L1