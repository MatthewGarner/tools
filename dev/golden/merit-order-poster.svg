<svg xmlns="http://www.w3.org/2000/svg" width="1312" height="808" viewBox="0 0 1312 808" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"><rect width="1312" height="808" fill="#f7f8f6"/><defs><pattern id="poster-grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0 H0 V26" fill="none" stroke="rgba(70,110,140,.10)" stroke-width="1"/></pattern></defs><rect width="1312" height="808" fill="url(#poster-grid)"/><rect x="56" y="56" width="46" height="4" rx="2" fill="#C05621"/><text x="56" y="102" font-size="28" font-weight="700" fill="#222">40 GW of demand clears at £83/MWh — CCGT 60% is the marginal plant and sets the price. Storage is dispatched ahead of gas — the shaded rent on it is the arbitrage spread</text><text x="56" y="140" font-size="28" font-weight="700" fill="#222">it earns, not a fuel margin. Shaded plants earn above running cost on every MW they dispatch — that rent, not the price itself, is what the merit order redistributes.</text><g transform="translate(56 178)"><svg xmlns="http://www.w3.org/2000/svg" width="1200" height="512" viewBox="0 0 1200 512" font-family="Charter,Georgia,serif"><defs><pattern id='mo-hatch' width='6' height='6' patternUnits='userSpaceOnUse' patternTransform='rotate(45)'><line x1='0' y1='0' x2='0' y2='6' stroke='#fff' stroke-width='1.6' opacity='0.55'/></pattern><pattern id='mo-dots' width='6' height='6' patternUnits='userSpaceOnUse'><circle cx='3' cy='3' r='1.15' fill='#fff' opacity='0.6'/></pattern><pattern id='mo-cross' width='7' height='7' patternUnits='userSpaceOnUse'><path d='M0 0 L7 7 M7 0 L0 7' stroke='#fff' stroke-width='1' opacity='0.5'/></pattern></defs><rect width='1200' height='512' fill='#f7f8f6'/><text x="116" y="34" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">MERIT ORDER — £/MWh vs cumulative GW offered</text><rect x='100' y='48' width='1084' height='352' rx='8' fill='#fff' stroke='#ddd'/><g data-plant='Wind' tabindex='0' role='button' aria-label='Wind — £0/MWh, 9 GW dispatched'><rect x='116' y='338.29' width='127.19' height='0' fill='#2a78d6'/><rect class='rent' x='116' y='262.54' width='127.19' height='75.74' fill='none'/></g><g data-plant='Solar' tabindex='0' role='button' aria-label='Solar — £0/MWh, 4.4 GW dispatched'><rect x='243.19' y='338.29' width='62.46' height='0' fill='#eda100'/><rect class='rent' x='243.19' y='262.54' width='62.46' height='75.74' fill='none'/></g><g data-plant='Hydro' tabindex='0' role='button' aria-label='Hydro — £3/MWh, 1.9 GW dispatched'><rect x='305.65' y='335.54' width='26.97' height='2.74' fill='#eb6834'/><rect class='rent' x='305.65' y='262.54' width='26.97' height='73' fill='none'/></g><g data-plant='Nuclear' tabindex='0' role='button' aria-label='Nuclear — £5/MWh, 6 GW dispatched'><rect x='332.62' y='333.71' width='85.17' height='4.57' fill='#4a3aa7'/><rect class='rent' x='332.62' y='262.54' width='85.17' height='71.17' fill='none'/></g><g data-plant='Waste/CHP' tabindex='0' role='button' aria-label='Waste/CHP — £20/MWh, 4.5 GW dispatched'><rect x='417.79' y='320' width='63.88' height='18.29' fill='#eb6834'/><rect class='rent' x='417.79' y='262.54' width='63.88' height='57.46' fill='none'/></g><g data-plant='BESS' data-storage='1' tabindex='0' role='button' aria-label='BESS — £47/MWh, 3.6 GW dispatched'><rect x='481.66' y='295.31' width='51.1' height='42.97' fill='#1baf7a'/><rect x='481.66' y='295.31' width='51.1' height='42.97' fill='url(#mo-hatch)'/><rect class='rent' x='481.66' y='262.54' width='51.1' height='32.77' fill='none'/></g><g data-plant='Pumped storage' data-storage='1' tabindex='0' role='button' aria-label='Pumped storage — £53/MWh, 1.4 GW dispatched'><rect x='532.77' y='289.83' width='19.87' height='48.46' fill='#1baf7a'/><rect x='532.77' y='289.83' width='19.87' height='48.46' fill='url(#mo-hatch)'/><rect class='rent' x='532.77' y='262.54' width='19.87' height='27.29' fill='none'/></g><g data-plant='Biomass' tabindex='0' role='button' aria-label='Biomass — £75/MWh, 4 GW dispatched'><rect x='552.64' y='269.71' width='56.78' height='68.57' fill='#008300'/><rect class='rent' x='552.64' y='262.54' width='56.78' height='7.17' fill='none'/></g><g data-plant='Imports' tabindex='0' role='button' aria-label='Imports — £80/MWh, 3 GW dispatched'><rect x='609.42' y='265.14' width='42.59' height='73.14' fill='#e87ba4'/><rect class='rent' x='609.42' y='262.54' width='42.59' height='2.6' fill='none'/></g><g data-plant='CCGT 60%' tabindex='0' role='button' aria-label='CCGT 60% — £83/MWh, 2.2 GW dispatched'><rect x='652' y='262.54' width='31.8' height='75.74' fill='#f4a3a2' stroke='#08c' stroke-width='2'/><rect x='683.8' y='262.54' width='56.21' height='75.74' fill='#f4a3a2' opacity='0.3'/><text x="667.9" y="236.54" font-size="11" font-weight="700" text-anchor="middle" stroke="#fff" stroke-width="3" stroke-linejoin="round" paint-order="stroke" fill="#08c">MARGINAL · sets the price</text></g><g data-plant='CCGT 54%' tabindex='0' role='button' aria-label='CCGT 54% — £92/MWh, 0 GW dispatched'><rect x='740.01' y='254.43' width='220.02' height='83.85' fill='#ec7675' opacity='0.3'/></g><g data-plant='CCGT 49%' tabindex='0' role='button' aria-label='CCGT 49% — £101/MWh, 0 GW dispatched'><rect x='960.04' y='246.15' width='132.01' height='92.13' fill='#e34948' opacity='0.3'/></g><g data-plant='OCGT 42%' tabindex='0' role='button' aria-label='OCGT 42% — £120/MWh, 0 GW dispatched'><rect x='1092.05' y='228.51' width='21.29' height='109.77' fill='#bf3636' opacity='0.3'/></g><g data-plant='OCGT 36%' tabindex='0' role='button' aria-label='OCGT 36% — £139/MWh, 0 GW dispatched'><rect x='1113.34' y='211.13' width='14.2' height='127.15' fill='#932a2d' opacity='0.3'/></g><line class='zero-line' x1='116' y1='338.29' x2='1168' y2='338.29' stroke='#ddd' stroke-width='1.5'/><text x="106" y="342.29" font-size="12" text-anchor="end" fill="#667">£0</text><text x="106" y="68" font-size="11" text-anchor="end" fill="#667">£300</text><text x="106" y="388" font-size="11" text-anchor="end" fill="#667">£-50</text><text x="179.59" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Wind</text><text x="274.42" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Solar</text><text x="319.13" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Hydro</text><text x="375.2" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Nuclear</text><text x="449.73" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Waste/CHP</text><text x="517.15" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Storage</text><text x="581.03" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Biomass</text><text x="630.71" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Imports</text><text x="889.77" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Gas</text><line class='clearing-line' x1='116' y1='262.54' x2='1168' y2='262.54' stroke='#08c' stroke-width='2' stroke-dasharray='6 4'/><text x="1168" y="254.54" font-size="12.5" font-weight="700" text-anchor="end" fill="#08c">clears at £83/MWh</text><line class='demand-line' x1='683.8' y1='64' x2='683.8' y2='384' stroke='#222' stroke-width='1.5' stroke-dasharray='4 3'/><text x="683.8" y="56" font-size="12" font-weight="600" text-anchor="middle" fill="#222">demand 40 GW</text><text x="116" y="428" font-size="11" fill="#667">0 GW</text><text x="1168" y="428" font-size="11" text-anchor="end" fill="#667">71.3 GW offered</text><rect x='116' y='443' width='14' height='14' fill='none' stroke='#08c'/><text x="136" y="454" font-size="11.5" fill="#667">shaded = earns above running cost (storage: the arbitrage spread)</text></svg></g><line x1="56" y1="714" x2="1256" y2="714" stroke="#ddd"/><text x="56" y="736" font-size="13" font-weight="600" fill="#667">Merit order   ·   2026-07-13   ·   clears £83/MWh   ·   demand 40 GW</text></svg>