tant or thinly evidenced — recheck as</text><text x="352" y="731" font-size="10" fill="#667">evidence lands.</text><text x="352" y="748" font-size="11" fill="#222">B</text><text x="352" y="779.5" font-size="10.5" font-weight="600" letter-spacing="0.8" fill="#1D7A3E">SAFE ENOUGH · 0</text><text x="352" y="794" font-size="10" fill="#667">Well-evidenced or low-stakes — spend</text><text x="352" y="807" font-size="10" fill="#667">discovery effort elsewhere.</text></svg>