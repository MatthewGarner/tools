<svg xmlns='http://www.w3.org/2000/svg' width='1280' height='912' viewBox='0 0 1280 912' font-family='Charter,Georgia,serif'><rect width='1280' height='912' fill='#f7f8f6'/><rect x='48' y='34' width='34' height='4' fill='#08c'/><text x="48" y="66" font-size="26" font-weight="700" fill="#222">Cycle budget — Wexcombe 100MW/2h</text><rect x='24' y='92' width='1232' height='222' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="118" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE CYCLE PRICE — DISPATCH THRESHOLD</text><rect x='300' y='132' width='187.4' height='34' fill='none'/><text x="393.69" y="146" font-size="11" text-anchor="middle" fill="#b33">don’t cycle</text><path d='M300 166 L307.3 166.0 L321.8 166.0 L336.4 166.0 L351.0 166.0 L365.5 166.0 L380.1 165.6 L394.7 166.0 L409.2 165.6 L423.8 166.0 L438.3 163.1 L452.9 161.9 L467.5 156.5 L482.0 157.3 L496.6 150.2 L511.2 145.7 L525.7 143.6 L540.3 144.0 L554.8 139.9 L569.4 136.1 L584.0 132.0 L598.5 141.5 L613.1 139.5 L627.7 142.0 L642.2 143.6 L656.8 146.5 L671.3 149.8 L685.9 155.6 L700.5 151.9 L715.0 154.0 L729.6 157.3 L744.2 155.6 L758.7 161.0 L773.3 159.8 L787.8 161.9 L802.4 163.1 L817.0 162.3 L831.5 164.3 L846.1 163.5 L860.7 165.6 L875.2 166.0 L889.8 165.2 L904.3 165.6 L918.9 165.2 L933.5 166.0 L948.0 166.0 L962.6 166.0 L977.2 166.0 L991.7 166.0 L1006.3 166.0 L1020.8 166.0 L1035.4 166.0 L1050.0 166.0 L1064.5 166.0 L1079.1 166.0 L1093.7 166.0 L1108.2 166.0 L1122.8 165.6 L1137.3 166.0 L1151.9 166.0 L1166.5 166.0 L1181.0 166.0 L1195.6 165.6 L1210.2 166.0 L1224.7 166.0 L1232 166 Z' fill='none' stroke='none'/><text x="1228" y="144" font-size="11" text-anchor="end" fill="#667">ribbon = days</text><line x1='487.4' y1='126' x2='487.4' y2='176' stroke='#08c' stroke-width='2.5'/><rect x='475.7' y='172' width='19.1' height='8' rx='4' fill='none'/><line x1='475.7' y1='171' x2='475.7' y2='181' stroke='#08c' stroke-width='2.5'/><line x1='494.8' y1='171' x2='494.8' y2='181' stroke='#08c' stroke-width='2.5'/><text x="487.39" y="194" font-size="11.5" text-anchor="middle" fill="#667">£31.7/MWh — whisker = your beliefs (P10–P90)</text><text x="501.39" y="158" font-size="11.5" fill="#222">~345 days a year clear</text><g><rect x='44.0' y='204' width='55.0' height='22' rx='11' fill='none'/><text x="54" y="219" font-size="12" font-weight="600" fill="#222">100MW</text></g><g><rect x='107.0' y='204' width='62.0' height='22' rx='11' fill='none'/><text x="117" y="219" font-size="12" font-weight="600" fill="#222">200MWh</text></g><rect x='177.0' y='204' width='111.0' height='22' rx='11' fill='none'/><text x="187" y="219" font-size="12" font-weight="600" fill="#667">spread</text><g><text x="236" y="219" font-size="12" font-weight="600" fill="#222">35</text></g><text x="250" y="219" font-size="12" font-weight="600" fill="#667">..</text><g><text x="264" y="219" font-size="12" font-weight="600" fill="#222">85</text></g><rect x='296.0' y='204' width='146.0' height='22' rx='11' fill='none'/><text x="306" y="219" font-size="12" font-weight="600" fill="#667">fade</text><g><text x="341" y="219" font-size="12" font-weight="600" fill="#222">0.006</text></g><text x="376" y="219" font-size="12" font-weight="600" fill="#667">..</text><g><text x="390" y="219" font-size="12" font-weight="600" fill="#222">0.012%</text></g><g><rect x='450.0' y='204' width='97.0' height='22' rx='11' fill='none'/><text x="460" y="219" font-size="12" font-weight="600" fill="#222">budget 6000</text></g><g><rect x='555.0' y='204' width='83.0' height='22' rx='11' fill='none'/><text x="565" y="219" font-size="12" font-weight="600" fill="#222">over 15yr</text></g><rect x='44.0' y='232' width='111.0' height='22' rx='11' fill='none'/><text x="54" y="247" font-size="12" font-weight="600" fill="#667">charge</text><g><text x="103" y="247" font-size="12" font-weight="600" fill="#222">15</text></g><text x="117" y="247" font-size="12" font-weight="600" fill="#667">..</text><g><text x="131" y="247" font-size="12" font-weight="600" fill="#222">45</text></g><rect x='163.0' y='232' width='97.0' height='22' rx='11' fill='none'/><text x="173" y="247" font-size="12" font-weight="600" fill="#667">rte</text><g><text x="201" y="247" font-size="12" font-weight="600" fill="#222">86</text></g><text x="215" y="247" font-size="12" font-weight="600" fill="#667">..</text><g><text x="229" y="247" font-size="12" font-weight="600" fill="#222">90%</text></g><rect x='268.0' y='232' width='132.0' height='22' rx='11' fill='none'/><text x="278" y="247" font-size="12" font-weight="600" fill="#667">calendar</text><g><text x="341" y="247" font-size="12" font-weight="600" fill="#222">1</text></g><text x="348" y="247" font-size="12" font-weight="600" fill="#667">..</text><g><text x="362" y="247" font-size="12" font-weight="600" fill="#222">1.8%</text></g><g><rect x='408.0' y='232' width='251.0' height='22' rx='11' fill='none'/><text x="418" y="247" font-size="12" font-weight="600" fill="#667">binds: warranty 10/10 · wear 0/10</text></g><rect x='48' y='264' width='4' height='44' fill='#08c'/><text x="66" y="280" font-size="15" fill="#222">Cycles are worth £31.7/MWh each (P10 £29.8/MWh – P90 £33/MWh) — only dispatch above that; 345 days a year clear it. In 10 runs in 10 it’s the warranty doing the</text><text x="66" y="302" font-size="15" fill="#222">rationing, not the wear.</text><rect x='24' y='332' width='1232' height='172' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="358" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE SECOND CYCLE</text><rect x='300' y='372' width='187.4' height='30' fill='none'/><path d='M300 402 L307.3 402.0 L321.8 401.8 L336.4 401.0 L351.0 395.3 L365.5 387.1 L380.1 378.4 L394.7 376.2 L409.2 372.0 L423.8 374.7 L438.3 376.0 L452.9 375.2 L467.5 383.9 L482.0 387.1 L496.6 393.8 L511.2 393.1 L525.7 397.5 L540.3 398.0 L554.8 400.0 L569.4 400.5 L584.0 400.3 L598.5 401.8 L613.1 401.5 L627.7 401.0 L642.2 402.0 L656.8 402.0 L671.3 402.0 L685.9 402.0 L700.5 401.8 L715.0 402.0 L729.6 402.0 L744.2 402.0 L758.7 402.0 L773.3 402.0 L787.8 402.0 L802.4 402.0 L817.0 402.0 L831.5 402.0 L846.1 402.0 L860.7 402.0 L875.2 402.0 L889.8 402.0 L904.3 402.0 L918.9 402.0 L933.5 402.0 L948.0 402.0 L962.6 402.0 L977.2 402.0 L991.7 402.0 L1006.3 402.0 L1020.8 402.0 L1035.4 402.0 L1050.0 402.0 L1064.5 402.0 L1079.1 402.0 L1093.7 402.0 L1108.2 402.0 L1122.8 402.0 L1137.3 402.0 L1151.9 402.0 L1166.5 402.0 L1181.0 402.0 L1195.6 402.0 L1210.2 402.0 L1224.7 402.0 L1232 402 Z' fill='none' stroke='none'/><line x1='487.4' y1='366' x2='487.4' y2='408' stroke='#08c' stroke-width='2.5'/><text x="1228" y="384" font-size="11" text-anchor="end" fill="#667">second-cycle days (same bar)</text><g><rect x='44.0' y='424' width='118.0' height='22' rx='11' fill='none'/><text x="54" y="439" font-size="12" font-weight="600" fill="#222">second 35..60%</text></g><g><rect x='170.0' y='424' width='125.0' height='22' rx='11' fill='none'/><text x="180" y="439" font-size="12" font-weight="600" fill="#667">+£310k/yr gross</text></g><g><rect x='303.0' y='424' width='118.0' height='22' rx='11' fill='none'/><text x="313" y="439" font-size="12" font-weight="600" fill="#667">−£168k/yr wear</text></g><g><rect x='429.0' y='424' width='104.0' height='22' rx='11' fill='none'/><text x="439" y="439" font-size="12" font-weight="600" fill="#667">£142k/yr net</text></g><rect x='48' y='454' width='4' height='44' fill='#08c'/><text x="66" y="470" font-size="15" fill="#222">The second cycle earns £310k/yr and costs £168k/yr of wear — £142k/yr net, and it pays over the life (£1.27M NPV). The warranty caps the pair in 10 runs in 10 —</text><text x="66" y="492" font-size="15" fill="#222">the second cycle spends budget the best single days want back.</text><text x="300" y="518" font-size="11" text-anchor="middle" fill="#667">0</text><text x="595.18" y="518" font-size="11" text-anchor="middle" fill="#667">50</text><text x="890.37" y="518" font-size="11" text-anchor="middle" fill="#667">100</text><text x="1185.55" 