x="365.58" y="194" font-size="11.5" text-anchor="middle" fill="#667">£12.2/MWh — whisker = your beliefs (P10–P90)</text><text x="379.58" y="158" font-size="11.5" fill="#222">~365 days a year clear</text><g data-edit='num' data-line='1' data-raw='100' data-field='mw' style='cursor:text'><rect x='44.0' y='204' width='55.0' height='22' rx='11' fill='none'/><text x="54" y="219" font-size="12" font-weight="600" fill="#222">100MW</text></g><g data-edit='num' data-line='1' data-raw='200' data-field='mwh' style='cursor:text'><rect x='107.0' y='204' width='62.0' height='22' rx='11' fill='none'/><text x="117" y="219" font-size="12" font-weight="600" fill="#222">200MWh</text></g><rect x='177.0' y='204' width='111.0' height='22' rx='11' fill='none'/><text x="187" y="219" font-size="12" font-weight="600" fill="#667">spread</text><g data-edit='num' data-line='2' data-raw='35' data-field='spreadLo' style='cursor:text'><text x="236" y="219" font-size="12" font-weight="600" fill="#222">35</text></g><text x="250" y="219" font-size="12" font-weight="600" fill="#667">..</text><g data-edit='num' data-line='2' data-raw='85' data-field='spreadHi' style='cursor:text'><text x="264" y="219" font-size="12" font-weight="600" fill="#222">85</text></g><rect x='296.0' y='204' width='146.0' height='22' rx='11' fill='none'/><text x="306" y="219" font-size="12" font-weight="600" fill="#667">fade</text><g data-edit='num' data-line='6' data-raw='0.006' data-field='fadeLo' style='cursor:text'><text x="341" y="219" font-size="12" font-weight="600" fill="#222">0.006</text></g><text x="376" y="219" font-size="12" font-weight="600" fill="#667">..</text><g data-edit='num' data-line='6' data-raw='0.012' data-field='fadeHi' style='cursor:text'><text x="390" y="219" font-size="12" font-weight="600" fill="#222">0.012%</text></g><g data-edit='num' data-line='8' data-raw='6000' data-field='budget' style='cursor:text'><rect x='450.0' y='204' width='97.0' height='22' rx='11' fill='none'/><text x="460" y="219" font-