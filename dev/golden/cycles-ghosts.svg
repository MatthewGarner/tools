8.0' y='232' width='251.0' height='22' rx='11' fill='none'/><text x="418" y="247" font-size="12" font-weight="600" fill="#667">binds: warranty 0/10 · wear 10/10</text></g><rect x='48' y='264' width='4' height='44' fill='#08c'/><text x="66" y="280" font-size="15" fill="#222">Cycles are worth £12.2/MWh each (P10 £8.97/MWh – P90 £16.5/MWh) — only dispatch above that; 365 days a year clear it. In 10 runs in 10 it’s the wear</text><text x="66" y="302" font-size="15" fill="#222">cost setting the bar, not the warranty.</text><rect x='24' y='332' width='1152' height='84' rx='8' fill='none' stroke='#ddd' stroke-dasharray='6 4'/><text x="44" y="358" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE SECOND CYCLE</text><text x="44" y="388" font-size="13.5" fill="#667">add second: 40..60% to price the second cycle</text><text x="300" y="430" font-size="11" text-anchor="middle" fill="#667">0</text><text x="569.85" y="430" font-size="11" text-anchor="middle" fill="#667">50</text><text x="839.69" y="430" font-size="11" text-anchor="middle" fill="#667">100</text><text x="1109.54" y="430" font-size="11" text-anchor="middle" fill="#667">150</text><text x="292" y="430" font-size="11" font-weight="600" text-anchor="end" fill="#667">£/MWh net</text><rect x='24' y='434' width='1152' height='84' rx='8' fill='none' stroke='#ddd' stroke-dasharray='6 4'/><text x="44" y="460" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE ASSET LIFE</text><text x="44" y="490" font-size="13.5" fill="#667">add augment: 120..180 £/kWh to price the augmentation window</text></svg>