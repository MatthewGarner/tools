667">Important or thinly evidenced — recheck as</text><text x="475.20000000000005" y="919.35" font-size="13.5" fill="#667">evidence lands.</text><text x="475.20000000000005" y="942.3" font-size="14.850000000000001" fill="#222">B</text><text x="475.20000000000005" y="984.8249999999999" font-size="14.175" font-weight="600" letter-spacing="0.8" fill="#1D7A3E">SAFE ENOUGH · 0</text><text x="475.20000000000005" y="1004.4" font-size="13.5" fill="#667">Well-evidenced or low-stakes — spend discovery</text><text x="475.20000000000005" y="1021.9499999999999" font-size="13.5" fill="#667">effort elsewhere.</text></svg>