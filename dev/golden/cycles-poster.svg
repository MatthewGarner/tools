t="600" fill="#222">0.012%</text></g><g><rect x='450.0' y='168' width='97.0' height='22' rx='11' fill='none'/><text x="460" y="183" font-size="12" font-weight="600" fill="#222">budget 6000</text></g><g><rect x='555.0' y='168' width='83.0' height='22' rx='11' fill='none'/><text x="565" y="183" font-size="12" font-weight="600" fill="#222">over 15yr</text></g><rect x='44.0' y='196' width='111.0' height='22' rx='11' fill='none'/><text x="54" y="211" font-size="12" font-weight="600" fill="#667">charge</text><g><text x="103" y="211" font-size="12" font-weight="600" fill="#222">15</text></g><text x="117" y="211" font-size="12" font-weight="600" fill="#667">..</text><g><text x="131" y="211" font-size="12" font-weight="600" fill="#222">45</text></g><rect x='163.0' y='196' width='97.0' height='22' rx='11' fill='none'/><text x="173" y="211" font-size="12" font-weight="600" fill="#667">rte</text><g><text x="201" y="211" font-size="12" font-weight="600" fill="#222">86</text></g><text x="215" y="211" font-size="12" font-weight="600" fill="#667">..</text><g><text x="229" y="211" font-size="12" font-weight="600" fill="#222">90%</text></g><rect x='268.0' y='196' width='132.0' height='22' rx='11' fill='none'/><text x="278" y="211" font-size="12" font-weight="600" fill="#667">calendar</text><g><text x="341" y="211" font-size="12" font-weight="600" fill="#222">1</text></g><text x="348" y="211" font-size="12" font-weight="600" fill="#667">..</text><g><text x="362" y="211" font-size="12" font-weight="600" fill="#222">1.8%</text></g><g><rect x='408.0' y='196' width='251.0' height='22' rx='11' fill='none'/><text x="418" y="211" font-size="12" font-weight="600" fill="#667">binds: warranty 10/10 · wear 0/10</text></g><rect x='24' y='252' width='1232' height='172' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="278" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE SECOND CYCLE</text><rect x='300' y='292' width='187.4' height='30' fill='none'/><path d='M300 322 L307.