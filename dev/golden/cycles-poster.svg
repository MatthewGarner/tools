<svg xmlns="http://www.w3.org/2000/svg" width="1392" height="1128" viewBox="0 0 1392 1128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"><rect width="1392" height="1128" fill="#f7f8f6"/><defs><pattern id="poster-grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0 H0 V26" fill="none" stroke="rgba(70,110,140,.10)" stroke-width="1"/></pattern></defs><rect width="1392" height="1128" fill="url(#poster-grid)"/><rect x="56" y="56" width="46" height="4" rx="2" fill="#08c"/><text x="56" y="102" font-size="28" font-weight="700" fill="#222">Cycles are worth £31.7/MWh each (P10 £29.8/MWh – P90 £33/MWh) — only dispatch above that; 345 days a year clear it. In 10 runs in 10 it’s the warranty doing the rationing, not</text><text x="56" y="140" font-size="28" font-weight="700" fill="#222">the wear.</text><g transform="translate(56 178)"><svg xmlns='http://www.w3.org/2000/svg' width='1280' height='832' viewBox='0 0 1280 832' font-family='Charter,Georgia,serif'><rect width='1280' height='832' fill='#f7f8f6'/><rect x='24' y='56' width='1232' height='178' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="82" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE CYCLE PRICE — DISPATCH THRESHOLD</text><rect x='300' y='96' width='187.4' height='34' fill='none'/><text x="393.69" y="110" font-size="11" text-anchor="middle" fill="#b33">don’t cycle</text><path d='M300 130 L307.3 130.0 L321.8 130.0 L336.4 130.0 L351.0 130.0 L365.5 130.0 L380.1 129.6 L394.7 130.0 L409.2 129.6 L423.8 130.0 L438.3 127.1 L452.9 125.9 L467.5 120.5 L482.0 121.3 L496.6 114.2 L511.2 109.7 L525.7 107.6 L540.3 108.0 L554.8 103.9 L569.4 100.1 L584.0 96.0 L598.5 105.5 L613.1 103.5 L627.7 106.0 L642.2 107.6 L656.8 110.5 L671.3 113.8 L685.9 119.6 L700.5 115.9 L715.0 118.0 L729.6 121.3 L744.2 119.6 L758.7 125.0 L773.3 123.8 L787.8 125.9 L802.4 127.1 L817.0 126.3 L831.5 128.3 L846.1 127.5 L860.7 129.6 L875.2 130.0 L889.8 129.2 L904.3 129.6 L918.9 129.