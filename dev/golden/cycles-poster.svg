ext x="66" y="412" font-size="15" fill="#222">the second cycle spends budget the best single days want back.</text><text x="300" y="438" font-size="11" text-anchor="middle" fill="#667">0</text><text x="595.18" y="438" font-size="11" text-anchor="middle" fill="#667">50</text><text x="890.37" y="438" font-size="11" text-anchor="middle" fill="#667">100</text><text x="1185.55" y="438" font-size="11" text-anchor="middle" fill="#667">150</text><text x="292" y="438" font-size="11" font-weight="600" text-anchor="end" fill="#667">£/MWh net</text><rect x='24' y='442' width='1232' height='350' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="468" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE ASSET LIFE</text><rect x='385.2' y='486' width='78.1' height='190' fill='none'/><text x="424.27" y="500" font-size="11" text-anchor="middle" fill="#222">augment window</text><path d='M331.1 486.0 L393.2 498.0 L455.3 508.1 L517.5 517.7 L579.6 527.1 L641.7 536.1 L703.9 544.8 L766.0 553.4 L828.1 562.0 L890.3 570.4 L952.4 578.6 L1014.5 586.6 L1076.7 594.4 L1138.8 602.0 L1200.9 609.4 L1200.9 652.3 L1138.8 644.6 L1076.7 636.5 L1014.5 627.9 L952.4 618.8 L890.3 609.1 L828.1 598.9 L766.0 588.1 L703.9 576.7 L641.7 564.5 L579.6 552.3 L517.5 538.6 L455.3 524.8 L393.2 510.6 L331.1 497.5 Z' fill='none' stroke='none'/><path d='M331.1 490.5 L393.2 503.4 L455.3 515.8 L517.5 527.8 L579.6 539.4 L641.7 550.4 L703.9 561.0 L766.0 571.1 L828.1 580.7 L890.3 590.1 L952.4 599.2 L1014.5 607.9 L1076.7 616.2 L1138.8 624.4 L1200.9 632.1' fill='none' stroke='#08c' stroke-width='2.5'/><text x="292" y="494.48" font-size="11" text-anchor="end" fill="#667">£4.19M/yr</text><text x="1228" y="498" font-size="11" text-anchor="end" fill="#667">revenue fan P10–P90</text><text x="331.07" y="692" font-size="10.5" text-anchor="middle" fill="#667">y1</text><text x="455.33" y="692" font-size="10.5" text-anchor="middle" fill="#667">y3</text><text x="579.6" y="692" font-size="10.5" text-anchor="middle" fill=