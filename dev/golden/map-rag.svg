 y="653.5" font-size="10.5" font-weight="600" letter-spacing="0.8" fill="#9A6A00">VERIFY · 0</text><text x="352" y="668" font-size="10" fill="#667">The status may be right, but it rests on</text><text x="352" y="681" font-size="10" fill="#667">vibes — agree what evidence would</text><text x="352" y="694" font-size="10" fill="#667">confirm it.</text><text x="352" y="726.5" font-size="10.5" font-weight="600" letter-spacing="0.8" fill="#1D7A3E">TRUST THE COLOUR · 2</text><text x="352" y="741" font-size="10" fill="#667">Evidenced and stable-or-improving — the</text><text x="352" y="754" font-size="10" fill="#667">reported status deserves belief.</text><text x="352" y="771" font-size="11" fill="#222">Onboarding funnel</text><text data-edit="field" data-line="3" data-key="reported" data-raw="green" x="362" y="782.5" font-size="9.5" fill="#667">reported: green</text><text x="352" y="799.5" font-size="11" fill="#222">Partner API</text><text data-edit="field" data-line="4" data-key="reported" data-raw="red" x="362" y="811" font-size="9.5" fill="#667">reported: red</text></svg>