<svg xmlns="http://www.w3.org/2000/svg" width="360" height="820" viewBox="0 0 360 820" font-family="Charter,Georgia,serif"><defs><pattern id='mo-hatch' width='6' height='6' patternUnits='userSpaceOnUse' patternTransform='rotate(45)'><line x1='0' y1='0' x2='0' y2='6' stroke='#fff' stroke-width='1.6' opacity='0.55'/></pattern></defs><rect width='360' height='820' fill='#f7f8f6'/><text x="116" y="34" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">MERIT ORDER — £/MWh vs cumulative GW offered</text><rect x='100' y='48' width='244' height='352' rx='8' fill='#fff' stroke='#ddd'/><g data-plant='Wind'><rect x='116' y='338.29' width='25.63' height='0' fill='#2a78d6'/><rect class='rent' x='116' y='262.54' width='25.63' height='75.74' fill='none'/></g><g data-plant='Solar'><rect x='141.63' y='338.29' width='12.59' height='0' fill='#eda100'/><rect class='rent' x='141.63' y='262.54' width='12.59' height='75.74' fill='none'/></g><g data-plant='Hydro'><rect x='154.22' y='335.54' width='5.44' height='2.74' fill='#eb6834'/><rect class='rent' x='154.22' y='262.54' width='5.44' height='73' fill='none'/></g><g data-plant='Nuclear'><rect x='159.65' y='333.71' width='17.16' height='4.57' fill='#4a3aa7'/><rect class='rent' x='159.65' y='262.54' width='17.16' height='71.17' fill='none'/></g><g data-plant='Waste/CHP'><rect x='176.82' y='320' width='12.87' height='18.29' fill='#eb6834'/><rect class='rent' x='176.82' y='262.54' width='12.87' height='57.46' fill='none'/></g><g data-plant='BESS' data-storage='1'><rect x='189.69' y='295.31' width='10.3' height='42.97' fill='#1baf7a'/><rect x='189.69' y='295.31' width='10.3' height='42.97' fill='url(#mo-hatch)'/><rect class='rent' x='189.69' y='262.54' width='10.3' height='32.77' fill='none'/></g><g data-plant='Pumped storage' data-storage='1'><rect x='199.99' y='289.83' width='4' height='48.46' fill='#1baf7a'/><rect x='199.99' y='289.83' width='4' height='48.46' fill='url(#mo-hatch)'/><rect class='rent' x='199.99' y='262.54' width='4' height='27.29' fill='none'/></g><g data-plant='Biomass'><rect x='203.99' y='269.71' width='11.44' height='68.57' fill='#008300'/><rect class='rent' x='203.99' y='262.54' width='11.44' height='7.17' fill='none'/></g><g data-plant='Imports'><rect x='215.43' y='265.14' width='8.58' height='73.14' fill='#e87ba4'/><rect class='rent' x='215.43' y='262.54' width='8.58' height='2.6' fill='none'/></g><g data-plant='CCGT 60%'><rect x='224.02' y='262.54' width='6.41' height='75.74' fill='#f4a3a2' stroke='#08c' stroke-width='2'/><rect x='230.42' y='262.54' width='11.33' height='75.74' fill='#f4a3a2' opacity='0.3'/><text x="227.22" y="252.54" font-size="11" font-weight="700" text-anchor="middle" fill="#08c">MARGINAL · sets the price</text></g><g data-plant='CCGT 54%'><rect x='241.75' y='254.43' width='44.34' height='83.85' fill='#ec7675' opacity='0.3'/></g><g data-plant='CCGT 49%'><rect x='286.09' y='246.15' width='26.6' height='92.13' fill='#e34948' opacity='0.3'/></g><g data-plant='OCGT 42%'><rect x='312.69' y='228.51' width='4.29' height='109.77' fill='#bf3636' opacity='0.3'/></g><g data-plant='OCGT 36%'><rect x='316.99' y='211.13' width='2.86' height='127.15' fill='#932a2d' opacity='0.3'/></g><line class='zero-line' x1='116' y1='338.29' x2='328' y2='338.29' stroke='#ddd' stroke-width='1.5'/><text x="106" y="342.29" font-size="12" text-anchor="end" fill="#667">£0</text><text x="106" y="68" font-size="11" text-anchor="end" fill="#667">£300</text><text x="106" y="388" font-size="11" text-anchor="end" fill="#667">£-50</text><text x="128.82" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Wind</text><text x="147.92" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Solar</text><text x="156.94" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Hydro</text><text x="168.23" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Nuclear</text><text x="183.25" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Waste/CHP</text><text x="196.84" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Storage</text><text x="209.71" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Biomass</text><text x="219.73" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Imports</text><text x="271.93" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Gas</text><line class='clearing-line' x1='116' y1='262.54' x2='328' y2='262.54' stroke='#08c' stroke-width='2' stroke-dasharray='6 4'/><text x="328" y="254.54" font-size="12.5" font-weight="700" text-anchor="end" fill="#08c">clears at £83/MWh</text><line class='demand-line' x1='230.42' y1='64' x2='230.42' y2='384' stroke='#222' stroke-width='1.5' stroke-dasharray='4 3'/><text x="230.42" y="56" font-size="12" font-weight="600" text-anchor="middle" fill="#222">demand 40 GW</text><text x="116" y="428" font-size="11" fill="#667">0 GW</text><text x="328" y="428" font-size="11" text-anchor="end" fill="#667">71.3 GW offered</text><rect x='116' y='443' width='14' height='14' fill='none' stroke='#08c'/><text x="136" y="454" font-size="11.5" fill="#667">shaded = earns above running cost (storage: the arbitrage spread)</text><rect x='100' y='484' width='4' height='272' fill='#08c'/><text x="116" y="480" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE TRADE</text><text x="116" y="504" font-size="15" fill="#222">40 GW of demand clears at</text><text x="116" y="526" font-size="15" fill="#222">£83/MWh — CCGT 60% is the</text><text x="116" y="548" font-size="15" fill="#222">marginal plant and sets the</text><text x="116" y="570" font-size="15" fill="#222">price. Storage is dispatched</text><text x="116" y="592" font-size="15" fill="#222">ahead of gas — the shaded rent</text><text x="116" y="614" font-size="15" fill="#222">on it is the arbitrage spread</text><text x="116" y="636" font-size="15" fill="#222">it earns, not a fuel margin.</text><text x="116" y="658" font-size="15" fill="#222">Shaded plants earn above</text><text x="116" y="680" font-size="15" fill="#222">running cost on every MW they</text><text x="116" y="702" font-size="15" fill="#222">dispatch — that rent, not the</text><text x="116" y="724" font-size="15" fill="#222">price itself, is what the</text><text x="116" y="746" font-size="15" fill="#222">merit order redistributes.</text></svg>