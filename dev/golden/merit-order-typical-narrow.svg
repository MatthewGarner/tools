<svg xmlns="http://www.w3.org/2000/svg" width="360" height="754" viewBox="0 0 360 754" font-family="Charter,Georgia,serif"><defs><pattern id='mo-hatch' width='6' height='6' patternUnits='userSpaceOnUse' patternTransform='rotate(45)'><line x1='0' y1='0' x2='0' y2='6' stroke='#fff' stroke-width='1.6' opacity='0.55'/></pattern><pattern id='mo-dots' width='6' height='6' patternUnits='userSpaceOnUse'><circle cx='3' cy='3' r='1.15' fill='#fff' opacity='0.6'/></pattern><pattern id='mo-cross' width='7' height='7' patternUnits='userSpaceOnUse'><path d='M0 0 L7 7 M7 0 L0 7' stroke='#fff' stroke-width='1' opacity='0.5'/></pattern></defs><rect width='360' height='754' fill='#f7f8f6'/><text x="44" y="34" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">MERIT ORDER — £/MWh</text><rect x='28' y='48' width='316' height='352' rx='8' fill='#fff' stroke='#ddd'/><g data-plant='Wind'><rect x='44' y='338.29' width='34.34' height='0' fill='#2a78d6'/><rect class='rent' x='44' y='262.54' width='34.34' height='75.74' fill='none'/></g><g data-plant='Solar'><rect x='78.34' y='338.29' width='16.86' height='0' fill='#eda100'/><rect class='rent' x='78.34' y='262.54' width='16.86' height='75.74' fill='none'/></g><g data-plant='Hydro'><rect x='95.2' y='335.54' width='7.28' height='2.74' fill='#eb6834'/><rect class='rent' x='95.2' y='262.54' width='7.28' height='73' fill='none'/></g><g data-plant='Nuclear'><rect x='102.48' y='333.71' width='22.99' height='4.57' fill='#4a3aa7'/><rect class='rent' x='102.48' y='262.54' width='22.99' height='71.17' fill='none'/></g><g data-plant='Waste/CHP'><rect x='125.47' y='320' width='17.24' height='18.29' fill='#eb6834'/><rect class='rent' x='125.47' y='262.54' width='17.24' height='57.46' fill='none'/></g><g data-plant='BESS' data-storage='1'><rect x='142.72' y='295.31' width='13.8' height='42.97' fill='#1baf7a'/><rect x='142.72' y='295.31' width='13.8' height='42.97' fill='url(#mo-hatch)'/><rect class='rent' x='142.72' y='262.54' width='13.8' height='32.77' fill='none'/></g><g data-plant='Pumped storage' data-storage='1'><rect x='156.51' y='289.83' width='5.36' height='48.46' fill='#1baf7a'/><rect x='156.51' y='289.83' width='5.36' height='48.46' fill='url(#mo-hatch)'/><rect class='rent' x='156.51' y='262.54' width='5.36' height='27.29' fill='none'/></g><g data-plant='Biomass'><rect x='161.88' y='269.71' width='15.33' height='68.57' fill='#008300'/><rect class='rent' x='161.88' y='262.54' width='15.33' height='7.17' fill='none'/></g><g data-plant='Imports'><rect x='177.2' y='265.14' width='11.5' height='73.14' fill='#e87ba4'/><rect class='rent' x='177.2' y='262.54' width='11.5' height='2.6' fill='none'/></g><g data-plant='CCGT 60%'><rect x='188.7' y='262.54' width='8.58' height='75.74' fill='#f4a3a2' stroke='#08c' stroke-width='2'/><rect x='197.28' y='262.54' width='15.18' height='75.74' fill='#f4a3a2' opacity='0.3'/><text x="192.99" y="236.54" font-size="11" font-weight="700" text-anchor="middle" fill="#08c">MARGINAL</text></g><g data-plant='CCGT 54%'><rect x='212.46' y='254.43' width='59.4' height='83.85' fill='#ec7675' opacity='0.3'/></g><g data-plant='CCGT 49%'><rect x='271.86' y='246.15' width='35.64' height='92.13' fill='#e34948' opacity='0.3'/></g><g data-plant='OCGT 42%'><rect x='307.5' y='228.51' width='5.75' height='109.77' fill='#bf3636' opacity='0.3'/></g><g data-plant='OCGT 36%'><rect x='313.24' y='211.13' width='3.83' height='127.15' fill='#932a2d' opacity='0.3'/></g><line class='zero-line' x1='44' y1='338.29' x2='328' y2='338.29' stroke='#ddd' stroke-width='1.5'/><text x="34" y="342.29" font-size="12" text-anchor="end" fill="#667">£0</text><text x="34" y="68" font-size="11" text-anchor="end" fill="#667">£300</text><text x="34" y="388" font-size="11" text-anchor="end" fill="#667">£-50</text><g transform='rotate(-35 61.17 400)'><text x="61.17" y="400" font-size="10.5" font-weight="600" text-anchor="end" fill="#667">Wind</text></g><g transform='rotate(-35 86.77 400)'><text x="86.77" y="400" font-size="10.5" font-weight="600" text-anchor="end" fill="#667">Solar</text></g><g transform='rotate(-35 98.84 400)'><text x="98.84" y="400" font-size="10.5" font-weight="600" text-anchor="end" fill="#667">Hydro</text></g><g transform='rotate(-35 113.97 400)'><text x="113.97" y="400" font-size="10.5" font-weight="600" text-anchor="end" fill="#667">Nuclear</text></g><g transform='rotate(-35 134.09 400)'><text x="134.09" y="400" font-size="10.5" font-weight="600" text-anchor="end" fill="#667">Waste/CHP</text></g><g transform='rotate(-35 152.3 400)'><text x="152.3" y="400" font-size="10.5" font-weight="600" text-anchor="end" fill="#667">Storage</text></g><g transform='rotate(-35 169.54 400)'><text x="169.54" y="400" font-size="10.5" font-weight="600" text-anchor="end" fill="#667">Biomass</text></g><g transform='rotate(-35 182.95 400)'><text x="182.95" y="400" font-size="10.5" font-weight="600" text-anchor="end" fill="#667">Imports</text></g><g transform='rotate(-35 252.89 400)'><text x="252.89" y="400" font-size="10.5" font-weight="600" text-anchor="end" fill="#667">Gas</text></g><line class='clearing-line' x1='44' y1='262.54' x2='328' y2='262.54' stroke='#08c' stroke-width='2' stroke-dasharray='6 4'/><text x="44" y="254.54" font-size="12.5" font-weight="700" text-anchor="start" fill="#08c">£83/MWh</text><line class='demand-line' x1='197.28' y1='64' x2='197.28' y2='384' stroke='#222' stroke-width='1.5' stroke-dasharray='4 3'/><text x="197.28" y="56" font-size="12" font-weight="600" text-anchor="middle" fill="#222">demand 40 GW</text><text x="44" y="428" font-size="11" fill="#667">0 GW</text><text x="328" y="428" font-size="11" text-anchor="end" fill="#667">71.3 GW offered</text><rect x='44' y='443' width='14' height='14' fill='none' stroke='#08c'/><text x="64" y="454" font-size="11.5" fill="#667">shaded = earns above running cost</text><rect x='28' y='484' width='4' height='206' fill='#08c'/><text x="44" y="480" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE TRADE</text><text x="44" y="504" font-size="15" fill="#222">40 GW of demand clears at £83/MWh — CCGT</text><text x="44" y="526" font-size="15" fill="#222">60% is the marginal plant and sets the</text><text x="44" y="548" font-size="15" fill="#222">price. Storage is dispatched ahead of</text><text x="44" y="570" font-size="15" fill="#222">gas — the shaded rent on it is the</text><text x="44" y="592" font-size="15" fill="#222">arbitrage spread it earns, not a fuel</text><text x="44" y="614" font-size="15" fill="#222">margin. Shaded plants earn above running</text><text x="44" y="636" font-size="15" fill="#222">cost on every MW they dispatch — that</text><text x="44" y="658" font-size="15" fill="#222">rent, not the price itself, is what the</text><text x="44" y="680" font-size="15" fill="#222">merit order redistributes.</text></svg>