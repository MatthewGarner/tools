<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="574" viewBox="0 0 1200 574" font-family="Charter,Georgia,serif"><rect width='1200' height='574' fill='#f7f8f6'/><text x="116" y="34" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">MERIT ORDER — £/MWh vs cumulative GW dispatched</text><rect x='100' y='48' width='1084' height='352' rx='8' fill='#fff' stroke='#ddd'/><rect class='negative-band' x='116' y='338.29' width='1052' height='45.71' fill='none'/><g data-plant='Renewables'><rect x='116' y='338.29' width='183.92' height='27.43' fill='#222' stroke='#08c' stroke-width='2'/><rect x='299.92' y='338.29' width='199.24' height='27.43' fill='#667' opacity='0.35'/><text x="207.96" y="328.29" font-size="11" font-weight="700" text-anchor="middle" fill="#08c">MARGINAL · sets the price</text><text x="399.54" y="328.29" font-size="10.5" text-anchor="middle" fill="#667">would generate anyway</text><text x="307.58" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Renewables</text></g><g data-plant='Nuclear'><rect x='499.16' y='330.97' width='91.96' height='7.31' fill='#667' opacity='0.35'/><text x="545.14" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Nuclear</text></g><g data-plant='CCGT'><rect x='591.12' y='283.43' width='383.16' height='54.86' fill='#667' opacity='0.35'/><text x="782.7" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">CCGT</text></g><g data-plant='Peaker'><rect x='974.28' y='201.14' width='153.26' height='137.14' fill='#667' opacity='0.35'/><text x="1050.91" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Peaker</text></g><line class='zero-line' x1='116' y1='338.29' x2='1168' y2='338.29' stroke='#ddd' stroke-width='1.5'/><text x="106" y="342.29" font-size="12" text-anchor="end" fill="#667">£0</text><text x="106" y="68" font-size="11" text-anchor="end" fill="#667">£300</text><text x="106" y="388" font-size="11" text-anchor="end" fill="#667">£-50</text><line class='clearing-line' x1='116' y1='365.71' x2='1168' y2='365.71' stroke='#b33' stroke-width='2' stroke-dasharray='6 4'/><text x="1168" y="357.71" font-size="12.5" font-weight="700" text-anchor="end" fill="#b33">paying to generate — £-30/MWh clears</text><line class='demand-line' x1='299.92' y1='64' x2='299.92' y2='384' stroke='#222' stroke-width='1.5' stroke-dasharray='4 3'/><text x="299.92" y="56" font-size="12" font-weight="600" text-anchor="middle" fill="#222">demand 12 GW</text><text x="116" y="428" font-size="11" fill="#667">0 GW</text><text x="1168" y="428" font-size="11" text-anchor="end" fill="#667">66 GW installed</text><rect x='100' y='458' width='4' height='52' fill='#08c'/><text x="116" y="454" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE TRADE</text><text x="116" y="478" font-size="15" fill="#222">12 GW of demand clears at £-30/MWh — Renewables is the marginal plant and sets the price. The market is paying to generate: price runs negative until the</text><text x="116" y="500" font-size="15" fill="#222">must-run block clears. 13 GW would generate anyway — curtailed or exported, simplified away here.</text></svg>