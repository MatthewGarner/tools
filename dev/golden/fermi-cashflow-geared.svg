%</text><text x="26" y="537" font-size="10" font-weight="600" letter-spacing="0.5" fill="#222">LEVERED</text><rect x="615.57" y="527" width="175.15" height="16" rx="4" fill="none" stroke="#08c"/><line x1="693.67" y1="524" x2="693.67" y2="546" stroke="#08c" stroke-width="2.5"/><text x="693.67" y="559" font-size="11" font-weight="600" text-anchor="middle" fill="#08c">21.0%</text><text x="26" y="578" font-size="8.5" font-weight="600" letter-spacing="0.5" fill="#667">GEARING</text><text x="26" y="595" font-size="15" font-weight="600" fill="#222">76%</text><text x="184" y="578" font-size="8.5" font-weight="600" letter-spacing="0.5" fill="#667">EQUITY NPV P50</text><text x="184" y="595" font-size="15" font-weight="600" fill="#222">+2.03M</text><text x="342" y="578" font-size="8.5" font-weight="600" letter-spacing="0.5" fill="#667">UNDER COVER</text><text x="342" y="595" font-size="15" font-weight="600" fill="#222">50%</text><text x="500" y="578" font-size="8.5" font-weight="600" letter-spacing="0.5" fill="#667">WORST-YEAR DSCR</text><text x="500" y="595" font-size="15" font-weight="600" fill="#222">1.08×</text></svg>