<svg xmlns="http://www.w3.org/2000/svg" width="860" height="260" viewBox="0 0 860 260" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" role="img" aria-label="Today the pile never clears. Slice items 25% smaller clears it in 18 weeks. Ranked by time to clear the backlog of 20 — steady-state P85 lead breaks ties."><rect width="860" height="260" fill="#fff"/><text x="26" y="46" font-size="10" font-weight="600" letter-spacing="1" fill="#667">QUEUE TRIAGE — WHICH LEVER FIRST</text><text x="26" y="70" font-size="19" fill="#222">Today the pile <tspan font-weight="700">never clears</tspan>. Slice items 25% smaller clears it in <tspan font-weight="700">18 weeks</tspan>.</text><text x="26" y="92" font-size="12.5" fill="#667">Ranked by time to clear the backlog of 20 — steady-state P85 lead breaks ties.</text><text x="26" y="129" font-size="12.5" font-weight="700" fill="#222">Slice items 25% smaller</text><rect data-bar="size" x="276" y="118" width="232" height="16" rx="3" fill="#08c"/><text x="516" y="130" font-size="11.5" font-weight="600" fill="#222">18 weeks</text><text x="26" y="163" font-size="12.5" fill="#667">Cut intake 20%</text><rect data-bar="demand" x="276" y="152" width="407.6" height="16" rx="3" fill="#edf0ee" stroke="#ddd"/><text x="691.62" y="164" font-size="11.5" fill="#667">32 weeks</text><text x="26" y="197" font-size="12.5" fill="#667">Add a person (4 → 5)</text><rect data-bar="person" x="276" y="186" width="428" height="16" rx="3" fill="none" stroke="#b33" stroke-dasharray="4 3"/><text x="712" y="198" font-size="11.5" font-weight="600" fill="#b33">never drains</text><text x="26" y="231" font-size="12.5" fill="#667">Set the WIP limit to 4</text><rect data-bar="wip" x="276" y="220" width="428" height="16" rx="3" fill="none" stroke="#b33" stroke-dasharray="4 3"/><text x="712" y="232" font-size="11.5" font-weight="600" fill="#b33">never drains</text></svg>