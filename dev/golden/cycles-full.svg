'2.5'/><text x="471.3" y="194" font-size="11.5" text-anchor="middle" fill="#667">£31.7/MWh — whisker = your beliefs (P10–P90)</text><text x="485.3" y="158" font-size="11.5" fill="#222">~345 days a year clear</text><g><rect x='44.0' y='204' width='55.0' height='22' rx='11' fill='none'/><text x="54" y="219" font-size="12" font-weight="600" fill="#222">100MW</text></g><g><rect x='107.0' y='204' width='62.0' height='22' rx='11' fill='none'/><text x="117" y="219" font-size="12" font-weight="600" fill="#222">200MWh</text></g><rect x='177.0' y='204' width='111.0' height='22' rx='11' fill='none'/><text x="187" y="219" font-size="12" font-weight="600" fill="#667">spread</text><g><text x="236" y="219" font-size="12" font-weight="600" fill="#222">35</text></g><text x="250" y="219" font-size="12" font-weight="600" fill="#667">..</text><g><text x="264" y="219" font-size="12" font-weight="600" fill="#222">85</text></g><rect x='296.0' y='204' width='146.0' height='22' rx='11' fill='none'/><text x="306" y="219" font-size="12" font-weight="600" fill="#667">fade</text><g><text x="341" y="219" font-size="12" font-weight="600" fill="#222">0.006</text></g><text x="376" y="219" font-size="12" font-weight="600" fill="#667">..</text><g><text x="390" y="219" font-size="12" font-weight="600" fill="#222">0.012%</text></g><g><rect x='450.0' y='204' width='97.0' height='22' rx='11' fill='none'/><text x="460" y="219" font-size="12" font-weight="600" fill="#222">budget 6000</text></g><g><rect x='555.0' y='204' width='83.0' height='22' rx='11' fill='none'/><text x="565" y="219" font-size="12" font-weight="600" fill="#222">over 15yr</text></g><rect x='44.0' y='232' width='111.0' height='22' rx='11' fill='none'/><text x="54" y="247" font-size="12" font-weight="600" fill="#667">charge</text><g><text x="103" y="247" font-size="12" font-weight="600" fill="#222">15</text></g><text x="117" y="247" font-size="12" font-weight="600" fill="#667">..</text><g><text x="131" y="247" font-size="12" font-weight="600" fill="#222">45</text></g><rect x='163.0' y='232' width='97.0' height='22' rx='11' fill='none'/><text x="173" y="247" font-size="12" font-weight="600" fill="#667">rte</text><g><text x="201" y="247" font-size="12" font-weight="600" fill="#222">86</text></g><text x="215" y="247" font-size="12" font-weight="600" fill="#667">..</text><g><text x="229" y="247" font-size="12" font-weight="600" fill="#222">90%</text></g><rect x='268.0' y='232' width='132.0' height='22' rx='11' fill='none'/><text x="278" y="247" font-size="12" font-weight="600" fill="#667">calendar</text><g><text x="341" y="247" font-size="12" font-weight="600" fill="#222">1</text></g><text x="348" y="247" font-size="12" font-weight="600" fill="#667">..</text><g><text x="362" y="247" font-size="12" font-weight="600" fill="#222">1.8%</text></g><g><rect x='408.0' y='232' width='251.0' height='22' rx='11' fill='none'/><text x="418" y="247" font-size="12" font-weight="600" fill="#667">binds: warranty 10/10 · wear 0/10</text></g><rect x='48' y='264' width='4' height='44' fill='#08c'/><text x="66" y="280" font-size="15" fill="#222">Cycles are worth £31.7/MWh each (P10 £29.8/MWh – P90 £33/MWh) — only dispatch above that; 345 days a year clear it. In 10 runs in 10 it’s the warranty</text><text x="66" y="302" font-size="15" fill="#222">doing the rationing, not the wear.</text><rect x='24' y='332' width='1152' height='172' rx='8' fill='#fff' stroke='#ddd'/><text x="44" y="358" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE SECOND CYCLE</text><rect x='300' y='372' width='171.3' height='30' fill='none'/><path d='M300 402 L306.7 402.0 L320.0 401.8 L333.3 401.0 L346.6 395.3 L359.9 387.1 L373.2 378.4 L386.5 376.2 L399.8 372.0 L413.2 374.7 L426.5 376.0 L439.8 375.2 L453.1 383.9 L466.4 387.1 L479.7 393.8 L493.0 393.1 L506.3 397.5 L519.7 398.0 L533.0 400.0 L546.3 400.5 L559.6 400.3 L572.9 401.8 L586.2 401.5 L599.5 401.0 L612.8 402.0 L626.2 402.0 L639.5 402.0 L652.8 402.0 L666.1 401.8 L679.4 402.0