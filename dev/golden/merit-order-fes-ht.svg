<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" font-family="Charter,Georgia,serif"><defs><pattern id='mo-hatch' width='6' height='6' patternUnits='userSpaceOnUse' patternTransform='rotate(45)'><line x1='0' y1='0' x2='0' y2='6' stroke='#fff' stroke-width='1.6' opacity='0.55'/></pattern><pattern id='mo-dots' width='6' height='6' patternUnits='userSpaceOnUse'><circle cx='3' cy='3' r='1.15' fill='#fff' opacity='0.6'/></pattern><pattern id='mo-cross' width='7' height='7' patternUnits='userSpaceOnUse'><path d='M0 0 L7 7 M7 0 L0 7' stroke='#fff' stroke-width='1' opacity='0.5'/></pattern></defs><rect width='1200' height='600' fill='#f7f8f6'/><text x="116" y="34" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">MERIT ORDER — £/MWh vs cumulative GW offered</text><rect x='100' y='48' width='1084' height='352' rx='8' fill='#fff' stroke='#ddd'/><g data-plant='Wind'><rect x='116' y='338.29' width='316.77' height='0' fill='#2a78d6'/><rect class='rent' x='116' y='333.71' width='316.77' height='4.57' fill='none'/></g><g data-plant='Solar'><rect x='432.77' y='338.29' width='113.13' height='0' fill='#eda100'/><rect class='rent' x='432.77' y='333.71' width='113.13' height='4.57' fill='none'/></g><g data-plant='Hydro'><rect x='545.91' y='335.54' width='17.33' height='2.74' fill='#eb6834'/><rect class='rent' x='545.91' y='333.71' width='17.33' height='1.83' fill='none'/></g><g data-plant='Nuclear'><rect x='563.24' y='333.71' width='8.94' height='4.57' fill='#4a3aa7' stroke='#08c' stroke-width='2'/><rect x='572.18' y='333.71' width='36.68' height='4.57' fill='#4a3aa7' opacity='0.3'/><text x="567.71" y="307.71" font-size="11" font-weight="700" text-anchor="middle" fill="#08c">MARGINAL · sets the price</text></g><g data-plant='Waste/CHP'><rect x='608.86' y='320' width='41.06' height='18.29' fill='#eb6834' opacity='0.3'/></g><g data-plant='BESS' data-storage='1'><rect x='649.92' y='295.31' width='136.85' height='42.97' fill='#1baf7a' opacity='0.3'/></g><g data-plant='Pumped storage' data-storage='1'><rect x='786.77' y='289.83' width='47.9' height='48.46' fill='#1baf7a' opacity='0.3'/></g><g data-plant='Biomass'><rect x='834.67' y='269.71' width='33.76' height='68.57' fill='#008300' opacity='0.3'/></g><g data-plant='Imports'><rect x='868.43' y='265.14' width='27.37' height='73.14' fill='#e87ba4' opacity='0.3'/></g><g data-plant='CCGT 60%'><rect x='895.8' y='262.54' width='20.98' height='75.74' fill='#f4a3a2' opacity='0.3'/></g><g data-plant='CCGT 54%'><rect x='916.78' y='254.43' width='52.46' height='83.85' fill='#ec7675' opacity='0.3'/></g><g data-plant='Gas-CCS' data-tex='ccs'><rect x='969.24' y='253.58' width='73.9' height='84.71' fill='#b5766a' opacity='0.3'/></g><g data-plant='CCGT 49%'><rect x='1043.14' y='246.15' width='31.48' height='92.13' fill='#e34948' opacity='0.3'/></g><g data-plant='OCGT 42%'><rect x='1074.62' y='228.51' width='17.52' height='109.77' fill='#bf3636' opacity='0.3'/></g><g data-plant='OCGT 36%'><rect x='1092.14' y='211.13' width='11.68' height='127.15' fill='#932a2d' opacity='0.3'/></g><g data-plant='Hydrogen' data-tex='h2'><rect x='1103.82' y='155.43' width='23.72' height='182.86' fill='#722a4e' opacity='0.3'/></g><line class='zero-line' x1='116' y1='338.29' x2='1168' y2='338.29' stroke='#ddd' stroke-width='1.5'/><text x="106" y="342.29" font-size="12" text-anchor="end" fill="#667">£0</text><text x="106" y="68" font-size="11" text-anchor="end" fill="#667">£300</text><text x="106" y="388" font-size="11" text-anchor="end" fill="#667">£-50</text><text x="274.39" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Wind</text><text x="489.34" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Solar</text><text x="554.57" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Hydro</text><text x="586.05" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Nuclear</text><text x="629.39" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Waste/CHP</text><text x="742.29" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Storage</text><text x="851.55" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Biomass</text><text x="882.11" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Imports</text><text x="932.52" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Gas</text><text x="1006.19" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Gas-CCS</text><text x="1073.48" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Gas</text><text x="1115.68" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Hydrogen</text><line class='clearing-line' x1='116' y1='333.71' x2='1168' y2='333.71' stroke='#08c' stroke-width='2' stroke-dasharray='6 4'/><text x="1168" y="325.71" font-size="12.5" font-weight="700" text-anchor="end" fill="#08c">clears at £5/MWh</text><line class='demand-line' x1='572.18' y1='64' x2='572.18' y2='384' stroke='#222' stroke-width='1.5' stroke-dasharray='4 3'/><text x="572.18" y="56" font-size="12" font-weight="600" text-anchor="middle" fill="#222">demand 50 GW</text><text x="116" y="428" font-size="11" fill="#667">0 GW</text><text x="1168" y="428" font-size="11" text-anchor="end" fill="#667">110.9 GW offered</text><rect x='116' y='443' width='14' height='14' fill='none' stroke='#08c'/><text x="136" y="454" font-size="11.5" fill="#667">shaded = earns above running cost (storage: the arbitrage spread)</text><rect x='100' y='484' width='4' height='52' fill='#08c'/><text x="116" y="480" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE TRADE</text><text x="116" y="504" font-size="15" fill="#222">50 GW of demand clears at £5/MWh — Nuclear is the marginal plant and sets the price. 8.5 GW would generate anyway — curtailed or exported, simplified</text><text x="116" y="526" font-size="15" fill="#222">away here. Shaded plants earn above running cost on every MW they dispatch — that rent, not the price itself, is what the merit order redistributes.</text></svg>