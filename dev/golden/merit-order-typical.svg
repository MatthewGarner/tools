<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" font-family="Charter,Georgia,serif"><rect width='1200' height='600' fill='#f7f8f6'/><text x="116" y="34" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">MERIT ORDER — £/MWh vs cumulative GW dispatched</text><rect x='100' y='48' width='1084' height='352' rx='8' fill='#fff' stroke='#ddd'/><g data-plant='Renewables'><rect x='116' y='338.29' width='270.95' height='0' fill='#222'/><rect class='rent' x='116' y='283.43' width='270.95' height='54.86' fill='none'/><text x="251.47" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Renewables</text></g><g data-plant='Nuclear'><rect x='386.95' y='330.97' width='108.38' height='7.31' fill='#222'/><rect class='rent' x='386.95' y='283.43' width='108.38' height='47.54' fill='none'/><text x="441.14" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Nuclear</text></g><g data-plant='CCGT'><rect x='495.33' y='283.43' width='343.2' height='54.86' fill='#222' stroke='#08c' stroke-width='2'/><rect x='838.53' y='283.43' width='108.38' height='54.86' fill='#667' opacity='0.35'/><text x="666.93" y="273.43" font-size="11" font-weight="700" text-anchor="middle" fill="#08c">MARGINAL · sets the price</text><text x="721.12" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">CCGT</text></g><g data-plant='Peaker'><rect x='946.91' y='201.14' width='180.63' height='137.14' fill='#667' opacity='0.35'/><text x="1037.22" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Peaker</text></g><line class='zero-line' x1='116' y1='338.29' x2='1168' y2='338.29' stroke='#ddd' stroke-width='1.5'/><text x="106" y="342.29" font-size="12" text-anchor="end" fill="#667">£0</text><text x="106" y="68" font-size="11" text-anchor="end" fill="#667">£300</text><text x="106" y="388" font-size="11" text-anchor="end" fill="#667">£-50</text><line class='clearing-line' x1='116' y1='283.43' x2='1168' y2='283.43' stroke='#08c' stroke-width='2' stroke-dasharray='6 4'/><text x="1168" y="275.43" font-size="12.5" font-weight="700" text-anchor="end" fill="#08c">clears at £60/MWh</text><line class='demand-line' x1='838.53' y1='64' x2='838.53' y2='384' stroke='#222' stroke-width='1.5' stroke-dasharray='4 3'/><text x="838.53" y="56" font-size="12" font-weight="600" text-anchor="middle" fill="#222">demand 40 GW</text><text x="116" y="428" font-size="11" fill="#667">0 GW</text><text x="1168" y="428" font-size="11" text-anchor="end" fill="#667">56 GW installed</text><rect x='116' y='443' width='14' height='14' fill='none' stroke='#08c'/><text x="136" y="454" font-size="11.5" fill="#667">shaded = earns above running cost</text><rect x='100' y='484' width='4' height='52' fill='#08c'/><text x="116" y="480" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE TRADE</text><text x="116" y="504" font-size="15" fill="#222">40 GW of demand clears at £60/MWh — CCGT is the marginal plant and sets the price. Shaded plants earn above running cost on every MW they dispatch —</text><text x="116" y="526" font-size="15" fill="#222">that rent, not the price itself, is what the merit order redistributes.</text></svg>