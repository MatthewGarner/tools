 font-size="12" font-weight="600" text-anchor="middle" fill="#667">Solar</text><text x="319.13" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Hydro</text><text x="375.2" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Nuclear</text><text x="449.73" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Waste/CHP</text><text x="517.15" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Storage</text><text x="581.03" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Biomass</text><text x="630.71" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Imports</text><text x="889.77" y="406" font-size="12" font-weight="600" text-anchor="middle" fill="#667">Gas</text><line class='clearing-line' x1='116' y1='262.54' x2='1168' y2='262.54' stroke='#08c' stroke-width='2' stroke-dasharray='6 4'/><text x="1168" y="254.54" font-size="12.5" font-weight="700" text-anchor="end" fill="#08c">clears at £83/MWh</text><line class='demand-line' x1='683.8' y1='64' x2='683.8' y2='384' stroke='#222' stroke-width='1.5' stroke-dasharray='4 3'/><text x="683.8" y="56" font-size="12" font-weight="600" text-anchor="middle" fill="#222">demand 40 GW</text><text x="116" y="428" font-size="11" fill="#667">0 GW</text><text x="1168" y="428" font-size="11" text-anchor="end" fill="#667">71.3 GW offered</text><rect x='116' y='443' width='14' height='14' fill='none' stroke='#08c'/><text x="136" y="454" font-size="11.5" fill="#667">shaded = earns above running cost (storage: the arbitrage spread)</text><rect x='100' y='484' width='4' height='74' fill='#08c'/><text x="116" y="480" font-size="11.5" font-weight="700" letter-spacing=".08em" fill="#667">THE TRADE</text><text x="116" y="504" font-size="15" fill="#222">40 GW of demand clears at £83/MWh — CCGT 60% is the marginal plant and sets the price. Storage is dispatched ahead of gas — the shaded rent on it is</text><text x="116" y="526" font-size="15" fill="#222">the arbitrage spread it earns, not a fuel margin. Shaded plants earn above running cost on every MW they dispatch — that rent, not the price itself,</text><text x="116" y="548" font-size="15" fill="#222">is what the merit order redistributes.</text></svg>