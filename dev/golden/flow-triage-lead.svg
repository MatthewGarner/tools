<svg xmlns="http://www.w3.org/2000/svg" width="860" height="260" viewBox="0 0 860 260" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"><rect width="860" height="260" fill="#fff"/><text x="26" y="46" font-size="10" font-weight="600" letter-spacing="1" fill="#667">QUEUE TRIAGE — WHICH LEVER FIRST</text><text x="26" y="70" font-size="19" fill="#222">Best lever for lead time: <tspan font-weight="700">Slice items 25% smaller</tspan> — P85 goes from 6.9 days to <tspan font-weight="700">4.6 days</tspan>.</text><text x="26" y="92" font-size="12.5" fill="#667">Queue is healthy — ranked by steady-state P85 lead time.</text><text x="26" y="129" font-size="12.5" font-weight="700" fill="#222">Slice items 25% smaller</text><rect data-bar="size" x="276" y="118" width="155.7" height="16" rx="3" fill="#08c"/><text x="439.73" y="130" font-size="11.5" font-weight="600" fill="#222">4.6 days P85</text><text x="26" y="163" font-size="12.5" fill="#667">Cut intake 20%</text><rect data-bar="demand" x="276" y="152" width="210.6" height="16" rx="3" fill="#edf0ee" stroke="#ddd"/><text x="494.59" y="164" font-size="11.5" fill="#667">6.2 days P85</text><text x="26" y="197" font-size="12.5" fill="#667">Add a person (4 → 5)</text><rect data-bar="person" x="276" y="186" width="234.4" height="16" rx="3" fill="#edf0ee" stroke="#ddd"/><text x="518.39" y="198" font-size="11.5" fill="#667">6.9 days P85</text><text x="26" y="231" font-size="12.5" fill="#667">Set the WIP limit to 3</text><rect data-bar="wip" x="276" y="220" width="407.6" height="16" rx="3" fill="#edf0ee" stroke="#ddd"/><text x="691.62" y="232" font-size="11.5" fill="#667">12 days P85</text><line x1="510.4" y1="112" x2="510.4" y2="244" stroke="#222" stroke-width="1" stroke-dasharray="3 3"/><text x="515.39" y="242" font-size="10" fill="#667">today</text></svg>